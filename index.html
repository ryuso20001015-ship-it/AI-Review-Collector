  <title>Reflect-Tech - 実習振り返りAI評価・蓄積システム</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] },
          colors: { 
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
            grade: { A: '#3b82f6', B: '#10b981', C: '#f59e0b', None: '#9ca3af' }

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

  <!-- Firebase -->

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.fbConfig = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection };
  </script>

  <style>
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar { width: 8px; height: 8px; }

</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ==========================================
    // UI アイコンコンポーネント (Lucide互換)
    // ==========================================
    const Icons = {
