<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflect-Tech（実習振り返り評価アプリ）</title>
  
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel (ブラウザ内でのJSXトランスパイル用) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    .sync-active { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .attendance-grid-item { aspect-ratio: 1 / 1; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      ClipboardPaste, Play, Download, CheckCircle2, AlertCircle, 
      RefreshCw, FileSpreadsheet, Settings, Users, BookOpen, 
      List, Plus, Trash2, Edit3, Save, X, Upload, TableProperties, Cloud, CloudOff,
      UserCheck, UserMinus, Clock, UserX, RotateCcw, Lock
    } from 'https://esm.sh/lucide-react@0.330.0';

    // ==========================================
    // 先生専用設定（ここに直書きしてください）
    // ==========================================
    const PRIVATE_SETTINGS = {
      // 1. Gemini APIキーをダブルクォーテーションの間に貼り付けます
      geminiApiKey: "AIzaSyB_l1gm3HJGzI2J1Wx8xUNnEtNA6QGukBs", 
      
      // 2. Firebaseコンソールの構成（JSON）を1行の正しい形式で最適化しました
      firebaseConfig: '{"apiKey":"AIzaSyDapSZecN-WBkhXbPv1vMKSFNp-Pe1bJVY","authDomain":"reflect-tech-99d40.firebaseapp.com","projectId":"reflect-tech-99d40","storageBucket":"reflect-tech-99d40.firebasestorage.app","messagingSenderId":"603184148867","appId":"1:603184148867:web:b49f38d11dc8d74c9786b6","measurementId":"G-T23YQ0NJ28"}', 
      
      // 3. このアプリの同期用合言葉（お好きな英数字）
      appId: "my-reflect-tech-private-01", 
      
      // 4. 最初からクラウド同期をオンにする場合は true にします（最適化：最初から有効にしました）
      syncEnabled: true, 
      
      // 5. 授業出席記録アプリの「同期用合言葉」を入力すると自動連携します
      attendanceAppId: "" 
    };

    // ==========================================
    // ユーティリティ
    // ==========================================
    const getLocalDateString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const STATUS_MAP = {
      "出席": { color: "bg-green-500", light: "bg-green-100", text: "text-green-700", icon: <UserCheck className="w-3 h-3" /> },
      "欠席": { color: "bg-red-500", light: "bg-red-100", text: "text-red-700", icon: <UserX className="w-3 h-3" /> },
      "遅刻": { color: "bg-amber-500", light: "bg-amber-100", text: "text-amber-700", icon: <Clock className="w-3 h-3" /> },
      "公欠": { color: "bg-blue-500", light: "bg-blue-100", text: "text-blue-700", icon: <UserMinus className="w-3 h-3" /> }
    };

    const DEFAULT_DATA = {
      settings: PRIVATE_SETTINGS,
      classes: [
        { 
          classId: "1-1", className: "1年1組",
          students: [
            { id: "s1", number: 1, name: "山田 太郎", kana: "やまだ たろう", gender: "男", status: "出席" },
            { id: "s2", number: 2, name: "佐藤 花子", kana: "さとう はなこ", gender: "女", status: "出席" },
            { id: "s3", number: 3, name: "鈴木 一郎", kana: "すずき いちろう", gender: "男", status: "出席" },
          ] 
        }
      ],
      lessons: [],
      reflections: {} 
    };

    // ==========================================
    // メインコンポーネント
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('reflections');
      const [appData, setAppData] = useState(() => {
        const saved = localStorage.getItem('reflect_tech_data');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            // ソースコードの PRIVATE_SETTINGS が書き込まれていれば、そちらを強制的に優先する
            parsed.settings = {
              ...parsed.settings,
              geminiApiKey: PRIVATE_SETTINGS.geminiApiKey || parsed.settings.geminiApiKey,
              firebaseConfig: PRIVATE_SETTINGS.firebaseConfig || parsed.settings.firebaseConfig,
              appId: PRIVATE_SETTINGS.appId || parsed.settings.appId,
              syncEnabled: PRIVATE_SETTINGS.firebaseConfig ? PRIVATE_SETTINGS.syncEnabled : parsed.settings.syncEnabled,
              attendanceAppId: PRIVATE_SETTINGS.attendanceAppId || parsed.settings.attendanceAppId,
            };
            return parsed;
          } catch (e) {
            return DEFAULT_DATA;
          }
        }
        return DEFAULT_DATA;
      });
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      useEffect(() => { localStorage.setItem('reflect_tech_data', JSON.stringify(appData)); }, [appData]);

      // Firebase Sync Logic
      useEffect(() => {
        if (!appData.settings.syncEnabled || !appData.settings.firebaseConfig) { setUser(null); return; }
        
        let db;
        let unsubscribeMain;
        let unsubscribeAttendance;

        try {
          const config = JSON.parse(appData.settings.firebaseConfig);
          const app = !firebase.apps.length ? firebase.initializeApp(config) : firebase.app();
          db = app.firestore();
          const auth = app.auth();
          auth.signInAnonymously().then(cred => setUser(cred.user));
          
          // 1. Reflect-Tech自体のデータ同期
          unsubscribeMain = db.doc(`artifacts/${appData.settings.appId}/public/data/mainData`).onSnapshot((doc) => {
            if (doc.exists) {
              const remoteData = doc.data();
              setAppData(prev => (JSON.stringify(prev) !== JSON.stringify(remoteData) ? { ...remoteData, settings: prev.settings } : prev));
            }
          });

          // 2. 外部「授業出席記録アプリ」からの出欠データ自動受信（アンテナ機能）
          if (appData.settings.attendanceAppId) {
            unsubscribeAttendance = db.doc(`artifacts/${appData.settings.attendanceAppId}/public/data/latestAttendance`).onSnapshot((doc) => {
              if (doc.exists) {
                const attData = doc.data(); 
                if (attData && attData.classId && attData.attendance) {
                  setAppData(prev => {
                    const newClasses = prev.classes.map(c => {
                      if (c.classId !== attData.classId) return c;
                      const newStudents = c.students.map(s => {
                        if (attData.attendance[s.id]) {
                          return { ...s, status: attData.attendance[s.id] };
                        }
                        return s;
                      });
                      return { ...c, students: newStudents };
                    });
                    
                    if(JSON.stringify(prev.classes) !== JSON.stringify(newClasses)) {
                      return { ...prev, classes: newClasses };
                    }
                    return prev;
                  });
                }
              }
            });
          }

          return () => { 
            if(unsubscribeMain) unsubscribeMain(); 
            if(unsubscribeAttendance) unsubscribeAttendance(); 
          };
        } catch (e) { console.error(e); }
      }, [appData.settings.syncEnabled, appData.settings.firebaseConfig, appData.settings.appId, appData.settings.attendanceAppId]);

      const updateAppData = (newData) => {
        setAppData(newData);
        if (user && appData.settings.syncEnabled) {
          setIsSyncing(true);
          firebase.firestore().doc(`artifacts/${appData.settings.appId}/public/data/mainData`).set(newData)
            .finally(() => setIsSyncing(false));
        }
      };

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
          <header className="bg-blue-800 text-white shadow-md sticky top-0 z-40">
            <div className="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
              <div className="flex items-center gap-3">
                <h1 className="text-xl font-bold flex items-center gap-2">
                  <CheckCircle2 className="w-6 h-6 text-blue-300" /> Reflect-Tech
                </h1>
                {appData.settings.syncEnabled && (
                  <div className="flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-green-500/20 text-green-300 font-bold">
                    <Cloud className={`w-3 h-3 ${isSyncing ? 'animate-bounce' : ''}`} /> 同期中
                  </div>
                )}
              </div>
              <div className="flex gap-1 mt-2 sm:mt-0">
                <NavButton active={activeTab === 'reflections'} onClick={() => setActiveTab('reflections')} icon={<BookOpen className="w-4 h-4" />} label="授業別評価" />
                <NavButton active={activeTab === 'cumulative'} onClick={() => setActiveTab('cumulative')} icon={<List className="w-4 h-4" />} label="累積評価" />
                <NavButton active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon={<Settings className="w-4 h-4" />} label="設定" />
              </div>
            </div>
          </header>

          {toast.show && (
            <div className={`fixed top-16 right-4 z-50 px-4 py-3 rounded shadow-lg flex items-center gap-2 text-white font-bold animate-in slide-in-from-top-2 ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'}`}>
              <CheckCircle2 className="w-5 h-5" /> {toast.message}
            </div>
          )}

          <main className="container mx-auto px-2 py-4 sm:px-4 max-w-7xl">
            {activeTab === 'reflections' && <ReflectionsScreen appData={appData} setAppData={updateAppData} showToast={showToast} />}
            {activeTab === 'cumulative' && <CumulativeScreen appData={appData} />}
            {activeTab === 'settings' && <SettingsScreen appData={appData} setAppData={updateAppData} showToast={showToast} />}
          </main>
        </div>
      );
    }

    function NavButton({ active, onClick, icon, label }) {
      return (
        <button onClick={onClick} className={`flex items-center gap-2 px-3 py-2 rounded text-sm font-bold transition-colors ${active ? 'bg-white text-blue-800 shadow' : 'text-blue-100 hover:bg-blue-700'}`}>
          {icon}<span className="hidden sm:inline">{label}</span>
        </button>
      );
    }

    // ==========================================
    // 1. 授業別評価画面
    // ==========================================
    function ReflectionsScreen({ appData, setAppData, showToast }) {
      const [currentClassId, setCurrentClassId] = useState(appData.classes[0]?.classId || "");
      const [currentLessonId, setCurrentLessonId] = useState("");
      const [inputText, setInputText] = useState("");
      const [status, setStatus] = useState("idle");

      const currentClass = appData.classes.find(c => c.classId === currentClassId);
      const classLessons = appData.lessons.filter(l => l.classId === currentClassId).sort((a, b) => a.count - b.count);
      const activeLesson = classLessons.find(l => l.id === currentLessonId);

      useEffect(() => {
        if (currentClassId && !currentLessonId) {
          const lessons = appData.lessons.filter(l => l.classId === currentClassId);
          if (lessons.length > 0) setCurrentLessonId(lessons[0].id);
        }
      }, [currentClassId]);

      // スマート・ペースト：欠席・公欠の生徒をスキップして割り当てる
      const applyTextToTable = () => {
        if (!inputText || !currentClass) return;
        const lines = inputText.split('\n');
        const newReflections = { ...appData.reflections };
        let lineIdx = 0;
        let appliedCount = 0;

        currentClass.students.forEach((student) => {
          const key = `${currentLessonId}_${student.id}`;
          const isAbsent = (student.status === "欠席" || student.status === "公欠");

          if (isAbsent) {
            newReflections[key] = { ...(newReflections[key] || {}), text: "", aiGrade: "-", aiReason: "-", finalGrade: "-" };
          } else {
            const text = lineIdx < lines.length ? lines[lineIdx].trim() : "";
            newReflections[key] = { ...(newReflections[key] || {}), text: text };
            if (text) appliedCount++;
            lineIdx++;
          }
        });

        setAppData({ ...appData, reflections: newReflections });
        setInputText(""); 
        showToast(`${appliedCount}名分のテキストを反映しました（欠席者は自動スキップ済み）。`, "success");
      };

      const analyzeWithAI = async () => {
        const targets = currentClass.students.filter(s => {
          const r = appData.reflections[`${currentLessonId}_${s.id}`];
          return r && r.text && r.text.trim() !== "" && r.aiGrade === "-";
        }).map(s => ({ studentId: s.id, text: appData.reflections[`${currentLessonId}_${s.id}`].text }));

        if (targets.length === 0) return showToast("評価が必要なテキストがありません。", "info");
        const apiKey = appData.settings?.geminiApiKey;
        if (!apiKey) return showToast("設定からAPIキーを入力してください。", "error");

        setStatus('analyzing');
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: JSON.stringify(targets) }] }],
              systemInstruction: { parts: [{ text: "中学校技術科の振り返り評価A/B/C。JSON [{\"studentId\":\"...\",\"grade\":\"A|B|C\",\"reason\":\"...\"}]" }] },
              generationConfig: { responseMimeType: "application/json" }
            })
          });
          const data = await res.json();
          const aiResults = JSON.parse(data.candidates[0].content.parts[0].text);
          const newReflections = { ...appData.reflections };
          aiResults.forEach(r => {
            const k = `${currentLessonId}_${r.studentId}`;
            newReflections[k] = { ...newReflections[k], aiGrade: r.grade, aiReason: r.reason, finalGrade: r.grade };
          });
          setAppData({ ...appData, reflections: newReflections });
          showToast("AI評価が完了しました", "success");
        } catch (e) { showToast("AIエラーが発生しました", "error"); }
        finally { setStatus('idle'); }
      };

      if (!currentClass) return <div className="p-10 text-center text-slate-400">名簿を設定してください。</div>;

      return (
        <div className="space-y-4">
          <div className="bg-white p-3 rounded-lg shadow-sm border flex flex-wrap items-center justify-between gap-4">
            <div className="flex items-center gap-4">
              <select value={currentClassId} onChange={e => setCurrentClassId(e.target.value)} className="border rounded font-bold text-slate-700 px-3 py-1.5">
                {appData.classes.map(c => <option key={c.classId} value={c.classId}>{c.className}</option>)}
              </select>
              {classLessons.length > 0 && (
                <select value={currentLessonId} onChange={e => setCurrentLessonId(e.target.value)} className="border-blue-300 text-blue-800 rounded font-bold px-3 py-1.5 bg-blue-50">
                  {classLessons.map(l => <option key={l.id} value={l.id}>第{l.count}回: {l.title}</option>)}
                </select>
              )}
            </div>
            <button onClick={() => {
              const count = classLessons.length + 1;
              const newL = { id: `l_${Date.now()}`, classId: currentClassId, count, title: `第${count}回実習`, date: getLocalDateString() };
              setAppData({ ...appData, lessons: [...appData.lessons, newL] });
              setCurrentLessonId(newL.id);
            }} className="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2"><Plus className="w-4 h-4"/>授業追加</button>
          </div>

          {activeLesson && (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-1 space-y-4">
                <div className="bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col h-full">
                  <div className="bg-blue-50 px-4 py-3 border-b flex justify-between items-center">
                    <h2 className="font-bold text-blue-900 text-sm">振り返りの一括反映</h2>
                    {appData.settings.attendanceAppId && (
                      <span className="text-[10px] font-bold text-indigo-600 bg-indigo-100 px-2 py-1 rounded-full flex items-center gap-1">
                        <UserCheck className="w-3 h-3" /> 出欠自動同期中
                      </span>
                    )}
                  </div>
                  <div className="p-4 flex-1 flex flex-col space-y-3">
                    <textarea value={inputText} onChange={e => setInputText(e.target.value)} placeholder="出席番号順にコメント列をコピーして貼り付け。欠席者は自動的にスキップされます。" className="w-full flex-1 min-h-[200px] p-3 border rounded text-xs font-mono bg-slate-50" />
                    <button onClick={applyTextToTable} className="w-full py-2.5 bg-slate-800 text-white rounded-lg font-bold text-sm flex justify-center items-center gap-2"><TableProperties className="w-4 h-4" />1. 出席者のみに割り当てる</button>
                    <button onClick={analyzeWithAI} disabled={status==='analyzing'} className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold text-sm flex justify-center items-center gap-2 shadow-md">
                      {status === 'analyzing' ? <RefreshCw className="animate-spin w-4 h-4"/> : <Play className="w-4 h-4"/>} 2. 未評価分をAI解析
                    </button>
                  </div>
                </div>
              </div>

              <div className="lg:col-span-2">
                <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                  <div className="overflow-x-auto max-h-[600px]">
                    <table className="w-full text-left text-sm border-collapse">
                      <thead className="bg-slate-50 sticky top-0 z-10 shadow-sm">
                        <tr>
                          <th className="py-2 px-3 border-b w-12 text-center">番</th>
                          <th className="py-2 px-3 border-b w-24">氏名</th>
                          <th className="py-2 px-3 border-b w-16 text-center">出欠</th>
                          <th className="py-2 px-3 border-b">内容</th>
                          <th className="py-2 px-3 border-b w-14 text-center">AI</th>
                          <th className="py-2 px-3 border-b w-20 text-center bg-blue-50">最終</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y">
                        {currentClass.students.map((student) => {
                          const data = appData.reflections[`${currentLessonId}_${student.id}`] || { text: "", aiGrade: "-", aiReason: "-", finalGrade: "-" };
                          const sStyle = STATUS_MAP[student.status] || STATUS_MAP["出席"];
                          return (
                            <tr key={student.id} className={`${student.status === "欠席" || student.status === "公欠" ? 'bg-slate-100 opacity-60' : 'hover:bg-slate-50'}`}>
                              <td className="py-3 px-3 text-center text-slate-500 font-bold">{student.number}</td>
                              <td className="py-3 px-3 font-medium text-slate-700">{student.name}</td>
                              <td className="py-3 px-3 text-center">
                                <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold inline-flex items-center gap-1 ${sStyle.light} ${sStyle.text}`}>
                                  {sStyle.icon} {student.status}
                                </span>
                              </td>
                              <td className="py-3 px-3 text-slate-700 text-xs leading-relaxed">
                                {data.text || <span className="text-slate-300 italic">（未入力）</span>}
                                {data.aiReason && data.aiReason !== "-" && <div className="mt-1 text-[10px] text-slate-500 bg-blue-50 p-1 rounded border border-blue-100">AI: {data.aiReason}</div>}
                              </td>
                              <td className="py-3 px-3 text-center">
                                <span className={`inline-flex items-center justify-center w-6 h-6 rounded-full text-[10px] font-bold ${data.aiGrade === 'A' ? 'bg-green-100 text-green-700' : data.aiGrade === 'B' ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-400'}`}>{data.aiGrade}</span>
                              </td>
                              <td className="py-3 px-3 text-center bg-blue-50/30">
                                <select value={data.finalGrade || "-"} onChange={e => setAppData({ ...appData, reflections: { ...appData.reflections, [`${currentLessonId}_${student.id}`]: { ...data, finalGrade: e.target.value }}})} className="w-full border rounded text-xs font-bold bg-white p-1">
                                  <option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
                                </select>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 2. 累積評価画面
    // ==========================================
    function CumulativeScreen({ appData }) {
      const [currentClassId, setCurrentClassId] = useState(appData.classes[0]?.classId || "");
      const currentClass = appData.classes.find(c => c.classId === currentClassId);
      const classLessons = appData.lessons.filter(l => l.classId === currentClassId).sort((a, b) => a.count - b.count);

      if (!currentClass) return <div className="p-8 text-center text-slate-400">クラスがありません。</div>;

      return (
        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
          <div className="bg-slate-50 px-4 py-3 border-b flex items-center justify-between">
            <div className="flex items-center gap-3">
              <select value={currentClassId} onChange={e => setCurrentClassId(e.target.value)} className="border rounded font-bold text-slate-700 px-3 py-1">
                {appData.classes.map(c => <option key={c.classId} value={c.classId}>{c.className}</option>)}
              </select>
              <span className="text-sm font-bold text-slate-500">累積評価シート</span>
            </div>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left text-sm border-collapse">
              <thead className="bg-slate-100">
                <tr>
                  <th className="py-3 px-3 border-b border-r w-12 text-center sticky left-0 bg-slate-100">番</th>
                  <th className="py-3 px-3 border-b border-r w-32 sticky left-12 bg-slate-100">氏名</th>
                  {classLessons.map(l => <th key={l.id} className="py-3 px-2 border-b text-center min-w-[60px]">第{l.count}回</th>)}
                  <th className="py-3 px-3 border-b border-l bg-green-50 text-green-700 text-center font-bold">A計</th>
                </tr>
              </thead>
              <tbody>
                {currentClass.students.map(s => {
                  let aCount = 0;
                  return (
                    <tr key={s.id} className="hover:bg-slate-50 transition-colors">
                      <td className="p-2 border-r text-center sticky left-0 bg-white group-hover:bg-slate-50">{s.number}</td>
                      <td className="p-2 border-r font-medium sticky left-12 bg-white group-hover:bg-slate-50">{s.name}</td>
                      {classLessons.map(l => {
                        const g = appData.reflections[`${l.id}_${s.id}`]?.finalGrade;
                        if(g === 'A') aCount++;
                        return <td key={l.id} className="p-2 text-center font-bold text-slate-600">{g || '-'}</td>;
                      })}
                      <td className="p-2 text-center bg-green-50/20 text-green-700 font-bold border-l">{aCount || ''}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 設定画面（外部連携と名簿管理）
    // ==========================================
    function SettingsScreen({ appData, setAppData, showToast }) {
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || null);
      const [bulkImport, setBulkImport] = useState({ show: false, text: '' });
      const activeClass = appData.classes.find(c => c.classId === activeClassId);

      const updateSettings = (field, value) => {
        setAppData({ ...appData, settings: { ...appData.settings, [field]: value } });
      };

      const addStudent = () => {
        if (!activeClass) return;
        const nextNum = activeClass.students.length > 0 ? Math.max(...activeClass.students.map(s => s.number)) + 1 : 1;
        const newStudent = { id: `s_${Date.now()}`, number: nextNum, name: "", kana: "", gender: "未設定", status: "出席" };
        setAppData({
          ...appData, classes: appData.classes.map(c => c.classId === activeClassId ? { ...c, students: [...c.students, newStudent] } : c)
        });
      };

      const updateStudent = (studentId, field, value) => {
        setAppData({
          ...appData, classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: c.students.map(s => s.id === studentId ? { ...s, [field]: value } : s)
          } : c)
        });
      };

      const deleteStudent = (studentId) => {
        if(!window.confirm("この生徒を削除しますか？")) return;
        setAppData({
          ...appData, classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: c.students.filter(s => s.id !== studentId)
          } : c)
        });
      };

      const processBulkImport = () => {
        if (!bulkImport.text.trim() || !activeClass) return;
        const lines = bulkImport.text.split('\n').filter(l => l.trim() !== '');
        const newStudents = [];
        let currentMaxNumber = activeClass.students.length > 0 ? Math.max(...activeClass.students.map(s => s.number)) : 0;

        lines.forEach((line, i) => {
          const cols = line.split(/[\t, ]+/).map(c => c.trim().replace(/^"|"$/g, ''));
          if (cols.length === 0) return;
          let number = currentMaxNumber + 1;
          let name = cols[0];
          let kana = "";
          let gender = "未設定";

          if (!isNaN(parseInt(cols[0]))) {
            number = parseInt(cols[0]);
            name = cols[1] || "";
            kana = cols[2] || "";
            gender = cols[3] || "未設定";
          } else {
            name = cols[0] || "";
            kana = cols[1] || "";
            gender = cols[2] || "未設定";
          }
          currentMaxNumber = number;
          newStudents.push({ id: `s_bulk_${Date.now()}_${i}`, number, name, kana, gender, status: "出席" });
        });

        setAppData({
          ...appData, classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: [...c.students, ...newStudents]
          } : c)
        });
        setBulkImport({ show: false, text: '' });
        showToast(`${newStudents.length}名の生徒を追加しました`, "success");
      };

      return (
        <div className="max-w-5xl mx-auto space-y-6 pb-20">
          {/* システム設定 */}
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h2 className="text-lg font-bold flex items-center gap-2 mb-6 text-slate-800"><Settings className="w-5 h-5 text-blue-600" /> システム・同期設定</h2>
            
            <div className="mb-6 p-3 bg-slate-100 rounded-lg border border-slate-200 text-sm text-slate-600 flex items-start gap-2">
              <Lock className="w-4 h-4 mt-0.5 text-slate-400 shrink-0" />
              <p>設定情報はファイル上部の <code>PRIVATE_SETTINGS</code> に直書きされています。変更する場合はソースコードを直接編集してください。（※ここで入力しても、リロードすると直書きした値に戻ります）</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Gemini API Key</label>
                  <input type="password" value={appData.settings.geminiApiKey} onChange={e => updateSettings('geminiApiKey', e.target.value)} placeholder="ソースコードに直書きしてください" className="w-full p-2.5 text-sm border rounded bg-slate-50 text-slate-500" />
                </div>
                <div className="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                  <div className="flex items-center justify-between mb-3">
                    <div className="flex items-center gap-3">
                      <div className="bg-indigo-600 p-2 rounded-lg text-white"><Cloud className="w-5 h-5"/></div>
                      <div>
                        <p className="font-bold text-indigo-900 text-sm">クラウドリアルタイム同期</p>
                        <p className="text-[10px] text-indigo-700">Firebase経由で複数端末で同期します</p>
                      </div>
                    </div>
                    <input type="checkbox" checked={appData.settings.syncEnabled} onChange={e => updateSettings('syncEnabled', e.target.checked)} className="w-6 h-6 accent-indigo-600" />
                  </div>
                  <div className="mt-3">
                    <label className="block text-xs font-bold text-indigo-700 mb-1">本アプリの同期用合言葉</label>
                    <input 
                      type="text" 
                      value={appData.settings.appId} 
                      onChange={e => updateSettings('appId', e.target.value)} 
                      placeholder="ソースコードに直書きしてください" 
                      className="w-full p-2 text-sm border border-indigo-200 rounded text-slate-500" 
                    />
                  </div>
                </div>
              </div>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Firebase Config (JSON)</label>
                  <textarea value={appData.settings.firebaseConfig} onChange={e => updateSettings('firebaseConfig', e.target.value)} placeholder="ソースコードに直書きしてください" className="w-full h-24 p-3 text-[10px] font-mono border rounded bg-slate-50 text-slate-500" />
                </div>
                <div className="pt-2 border-t border-slate-100">
                  <label className="block text-xs font-bold text-indigo-500 mb-1 uppercase flex items-center gap-1"><UserCheck className="w-4 h-4"/> 外部アプリ連携 (授業出欠記録アプリ)</label>
                  <input 
                    type="text" 
                    value={appData.settings.attendanceAppId || ""} 
                    onChange={e => updateSettings('attendanceAppId', e.target.value)} 
                    placeholder="ソースコードに直書きしてください" 
                    className="w-full p-2.5 text-sm border border-indigo-200 rounded bg-white text-slate-500" 
                  />
                </div>
              </div>
            </div>
          </div>
          
          {/* 名簿管理（テーブル形式＋モーダル） */}
          <div className="bg-white rounded-xl shadow-sm border p-6">
            <h2 className="text-lg font-bold flex items-center gap-2 mb-4 text-slate-800"><Users className="w-5 h-5 text-blue-600" /> 名簿の管理</h2>
            
            <div className="flex flex-wrap gap-2 mb-6 border-b border-slate-100 pb-4">
              {appData.classes.map(c => (
                <button
                  key={c.classId} onClick={() => setActiveClassId(c.classId)}
                  className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors border ${
                    activeClassId === c.classId ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'
                  }`}
                >
                  {c.className}
                </button>
              ))}
              <button 
                onClick={() => {
                  const newId = `c_${Date.now()}`;
                  setAppData({ ...appData, classes: [...appData.classes, { classId: newId, className: "新規クラス", students: [] }] });
                  setActiveClassId(newId);
                }}
                className="px-3 py-2 rounded-lg text-slate-400 border border-dashed border-slate-300 hover:text-slate-600 hover:bg-slate-50"
              >
                <Plus className="w-4 h-4" />
              </button>
            </div>

            {activeClass && (
              <div>
                <div className="flex justify-between items-center mb-3">
                  <input 
                    type="text" value={activeClass.className}
                    onChange={e => setAppData({ ...appData, classes: appData.classes.map(c => c.classId === activeClassId ? { ...c, className: e.target.value } : c)})}
                    className="font-bold text-lg border-b-2 border-transparent hover:border-slate-300 focus:border-blue-500 focus:outline-none px-1 bg-transparent w-48"
                  />
                  <div className="flex gap-2">
                    <button onClick={() => setBulkImport({ show: true, text: '' })} className="flex items-center gap-1.5 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1.5 rounded text-sm font-bold transition-colors">
                      <Upload className="w-4 h-4" /> 一括追加
                    </button>
                    <button onClick={addStudent} className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors shadow-sm">
                      <Plus className="w-4 h-4" /> 1名追加
                    </button>
                  </div>
                </div>

                <table className="w-full text-left text-sm border-collapse">
                  <thead className="bg-slate-50 border-y border-slate-200">
                    <tr>
                      <th className="py-2 px-3 font-semibold text-slate-600 w-20 text-center">番号</th>
                      <th className="py-2 px-3 font-semibold text-slate-600">氏名</th>
                      <th className="py-2 px-3 font-semibold text-slate-600">ふりがな</th>
                      <th className="py-2 px-3 font-semibold text-slate-600 w-24">性別</th>
                      <th className="py-2 px-3 font-semibold text-slate-600 w-16 text-center">操作</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {activeClass.students.map(s => (
                      <tr key={s.id} className="hover:bg-slate-50/50 transition-colors">
                        <td className="py-1 px-3 text-center">
                          <input type="number" value={s.number} onChange={e => updateStudent(s.id, 'number', Number(e.target.value))} className="w-16 p-1.5 text-center border border-slate-200 rounded focus:ring-blue-500 bg-transparent" />
                        </td>
                        <td className="py-1 px-3">
                          <input type="text" value={s.name} onChange={e => updateStudent(s.id, 'name', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded focus:ring-blue-500 bg-transparent" placeholder="氏名" />
                        </td>
                        <td className="py-1 px-3">
                          <input type="text" value={s.kana || ""} onChange={e => updateStudent(s.id, 'kana', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded focus:ring-blue-500 bg-transparent" placeholder="ふりがな" />
                        </td>
                        <td className="py-1 px-3">
                          <select value={s.gender || "未設定"} onChange={e => updateStudent(s.id, 'gender', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded focus:ring-blue-500 bg-transparent">
                            <option value="未設定">未設定</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                            <option value="その他">その他</option>
                          </select>
                        </td>
                        <td className="py-1 px-3 text-center">
                          <button onClick={() => deleteStudent(s.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </td>
                      </tr>
                    ))}
                    {activeClass.students.length === 0 && (
                      <tr><td colSpan="5" className="py-8 text-center text-slate-400">生徒が登録されていません。</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}

            {/* バルクインポートモーダル */}
            {bulkImport.show && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
                  <div className="px-5 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                    <h3 className="font-bold flex items-center gap-2 text-slate-800"><Upload className="w-5 h-5 text-indigo-600"/> 名簿の一括追加</h3>
                    <button onClick={() => setBulkImport({ show: false, text: '' })} className="text-slate-400 hover:text-slate-600"><X className="w-5 h-5"/></button>
                  </div>
                  <div className="p-5">
                    <p className="text-xs text-slate-500 mb-2">エクセルやスプレッドシートから「番号」「氏名」「ふりがな」「性別」の列をコピーして貼り付けてください。</p>
                    <textarea
                      autoFocus
                      value={bulkImport.text} onChange={e => setBulkImport({ ...bulkImport, text: e.target.value })}
                      placeholder="1 山田太郎 やまだたろう 男&#10;2 佐藤花子 さとうはなこ 女"
                      className="w-full h-48 border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500"
                    />
                  </div>
                  <div className="px-5 py-4 border-t border-slate-200 flex justify-end gap-2 bg-slate-50">
                    <button onClick={() => setBulkImport({ show: false, text: '' })} className="px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-lg">キャンセル</button>
                    <button onClick={processBulkImport} className="px-4 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm">追加する</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
