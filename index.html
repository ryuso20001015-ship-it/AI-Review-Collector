<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Review-Collector</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts (BIZ UDPGothic - ユニバーサルデザインフォント) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"BIZ UDPGothic"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

  <!-- Firebase (Compat版) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

  <style>
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body { background: white; }
      .print-hidden { display: none !important; }
      .print-expand { width: 100% !important; max-height: none !important; overflow: visible !important; border: none !important; box-shadow: none !important; }
      table { width: 100% !important; border-collapse: collapse; }
    }
    input, select, textarea, button { font-family: inherit; }
    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'BIZ UDPGothic', sans-serif; color: #4b5563;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem; color: #1e40af;"></i>
      <h2 style="font-weight: bold; margin-bottom: 0.5rem;">AI-Review-Collectorを読み込んでいます...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // エラーバウンダリ（画面が真っ白になるのを防ぐ）
    // ==========================================
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, errorInfo) {
        console.error("エラーを捕捉しました:", error, errorInfo);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 max-w-2xl mx-auto mt-10 bg-white border-t-4 border-red-500 rounded shadow">
              <h2 className="text-xl font-bold text-red-600 mb-4"><i className="fa-solid fa-triangle-exclamation"></i> 予期せぬエラーが発生しました</h2>
              <p className="text-sm text-slate-700 mb-4">
                端末内に保存されている古いデータと、新しいシステムの間に互換性の問題が発生している可能性があります。
              </p>
              <div className="bg-slate-100 p-4 rounded text-xs font-mono text-red-800 mb-6 overflow-auto">
                {this.state.error && this.state.error.toString()}
              </div>
              <button 
                onClick={() => {
                  if (window.confirm("端末内のデータを初期化して再読み込みします。よろしいですか？")) {
                    localStorage.removeItem('ai_review_app_data');
                    localStorage.removeItem('ai_review_sync_id'); // 同期IDも完全に削除してクリーンな状態にする
                    window.location.reload();
                  }
                }}
                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold flex items-center gap-2"
              >
                <i className="fa-solid fa-trash-can"></i> データを初期化して復旧する
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ==========================================
    // ユーティリティ・定数
    // ==========================================
    const safeStorage = {
      get: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
      set: (key, value) => { try { localStorage.setItem(key, value); } catch (e) { } }
    };

    const getLocalDateString = () => {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const DEFAULT_RUBRIC = `・観点1：内容理解・充実度（授業内容や専門用語を正しく記述しているか）
・観点2：実生活とのつながり（自分の生活や社会課題と結びつけて考察しているか）
・観点3：新たな疑問や課題（次に向けて工夫したいことなどを見出しているか）

【判定条件】
・C評価：記述が極端に短い、または授業の主旨と関係ない。
・B評価：授業内容の要約や理解（観点1）が基本レベルでできている。
・A評価：観点1が非常に充実している、または観点1に加えて観点2や観点3の記述が含まれており、より深い考察ができている。`;

    const DEFAULT_DATA = {
      settings: { grades: { 1: 1, 2: 0, 3: 0 }, geminiApiKey: "", attendanceSyncCode: "" },
      classes: [
        { 
          classId: "1-1", className: "1年1組",
          students: [
            { id: "s1", number: 1, name: "山田 太郎", furigana: "やまだ たろう", gender: "男", status: "在籍" },
            { id: "s2", number: 2, name: "佐藤 花子", furigana: "さとう はなこ", gender: "女", status: "在籍" },
            { id: "s3", number: 3, name: "鈴木 一郎", furigana: "すずき いちろう", gender: "男", status: "在籍" }
          ] 
        }
      ],
      rubrics: { "1": DEFAULT_RUBRIC, "2": DEFAULT_RUBRIC, "3": DEFAULT_RUBRIC },
      lessons: [], // { id, classId, count, title, date, overallAnalysis: "" }
      reviews: {}  // key: "lessonId_studentId", value: { attendance: "未", text: "", aiEval: "", aiReason: "", manualEval: "" }
    };

    // データの欠落を完全に補完・修復する関数
    const sanitizeAppData = (parsed) => {
      if (!parsed || typeof parsed !== 'object') return DEFAULT_DATA;
      return {
        settings: {
          grades: parsed.settings?.grades || { 1: 1, 2: 0, 3: 0 },
          geminiApiKey: parsed.settings?.geminiApiKey || "",
          attendanceSyncCode: parsed.settings?.attendanceSyncCode || ""
        },
        classes: Array.isArray(parsed.classes) && parsed.classes.length > 0 
          ? parsed.classes.map(c => ({
              classId: c.classId || "",
              className: c.className || "",
              students: Array.isArray(c.students) ? c.students.map(s => ({
                ...s,
                furigana: s.furigana || "",
                gender: s.gender || "その他",
              })) : []
            }))
          : DEFAULT_DATA.classes,
        rubrics: parsed.rubrics || { "1": DEFAULT_RUBRIC, "2": DEFAULT_RUBRIC, "3": DEFAULT_RUBRIC },
        lessons: Array.isArray(parsed.lessons) ? parsed.lessons : [],
        reviews: parsed.reviews || {}
      };
    };

    // ==========================================
    // Firebase Setup
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCMssHig9YsBwXue4ujMTvpSwLtf1u92mY",
      authDomain: "class-attendance-record.firebaseapp.com",
      databaseURL: "https://class-attendance-record-default-rtdb.firebaseio.com",
      projectId: "class-attendance-record",
      storageBucket: "class-attendance-record.firebasestorage.app",
      messagingSenderId: "829706690099",
      appId: "1:829706690099:web:63c41a0313ef7717798d46"
    };

    let app, auth, db;
    if (firebaseConfig.apiKey) {
      try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch (e) { console.error("Firebase Init Error:", e); }
    }

    // ==========================================
    // Gemini API Call
    // ==========================================
    const callGeminiAPI = async (apiKey, rubric, targetData) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `以下の生徒の振り返りテキストを、指定した評価基準に従って「A」「B」「C」の3段階で評価してください。
また、その評価に至った理由を簡潔（50文字以内）に記述してください。

【評価基準】
${rubric}

【生徒のテキスト（JSON形式）】
${JSON.stringify(targetData)}

【出力形式の厳守事項】
必ず以下のJSONスキーマに従うこと。マークダウン（\`\`\`json 等）を含めず、純粋なJSON配列のみを出力すること。
[
  {
    "studentId": "生徒のID",
    "aiEval": "A または B または C",
    "aiReason": "評価の理由"
  }
]`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { response_mime_type: "application/json" }
        })
      });
      
      if (!response.ok) {
        const err = await response.text();
        throw new Error(`API Error: ${response.status} - ${err}`);
      }
      const data = await response.json();
      const textResponse = data.candidates[0].content.parts[0].text;
      return JSON.parse(textResponse);
    };

    // クラス全体の振り返りを分析するAPI関数
    const callGeminiOverallAnalysisAPI = async (apiKey, targetData) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `あなたは中学校のベテラン教員です。以下の生徒たちの「授業の振り返り」を分析し、クラス全体の理解度の傾向と、次回の授業に向けた教員への具体的なアドバイス（指導の改善点や補足すべき内容など）をまとめてください。

【生徒の振り返りテキスト（抜粋）】
${JSON.stringify(targetData, null, 2)}

【出力形式】
以下の要素を含め、Markdown形式（見出しや箇条書き）で簡潔かつ読みやすく記述してください。
1. クラス全体の理解度と傾向
2. 共通して見られるつまずきや疑問点
3. 次回の授業に向けたアドバイス`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });
      
      if (!response.ok) {
        const err = await response.text();
        throw new Error(`API Error: ${response.status} - ${err}`);
      }
      const data = await response.json();
      return data.candidates[0].content.parts[0].text;
    };


    // ==========================================
    // メインコンポーネント (App)
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('evaluation');
      const [appData, setAppData] = useState(DEFAULT_DATA);
      const [isLoaded, setIsLoaded] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [user, setUser] = useState(null);

      // Firebase Sync State
      const [syncId, setSyncId] = useState(() => {
        let id = safeStorage.get('ai_review_sync_id');
        if (!id) {
          id = Math.floor(10000000 + Math.random() * 90000000).toString();
          safeStorage.set('ai_review_sync_id', id);
        }
        return id;
      });
      const lastCloudUpdateTime = useRef(0);
      const isIncomingUpdate = useRef(false);
      const isLinkedDevice = useRef(false);
      const [isSyncing, setIsSyncing] = useState(false);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      const saveToFirebase = async (dataToSave) => {
        if (!db || !user) return;
        setIsSyncing(true);
        const now = new Date().toISOString();
        lastCloudUpdateTime.current = new Date(now).getTime();
        try {
          await db.collection('ai_review_sync').doc(syncId).set({ 
            data: JSON.stringify(dataToSave), updatedAt: now 
          });
        } catch (e) { console.error("Firebase Sync Error:", e); } 
        finally { setTimeout(() => setIsSyncing(false), 1000); }
      };

      // 初期ロード
      useEffect(() => {
        const saved = safeStorage.get('ai_review_app_data');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setAppData(sanitizeAppData(parsed));
          } catch(e){
              console.error("データのパースに失敗しました", e);
              setAppData(DEFAULT_DATA);
          }
        }
        setIsLoaded(true);
      }, []);

      // Firebase Listen
      useEffect(() => {
        if (!db || !user || !isLoaded) return;
        const unsubscribe = db.collection('ai_review_sync').doc(syncId).onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            const cloudTime = data.updatedAt ? new Date(data.updatedAt).getTime() : 0;
            if (cloudTime > lastCloudUpdateTime.current) {
              lastCloudUpdateTime.current = cloudTime;
              isIncomingUpdate.current = true;
              
              try {
                const parsed = JSON.parse(data.data);
                setAppData(sanitizeAppData(parsed));
              } catch(e) {
                console.error("Firebaseデータのパースに失敗しました", e);
              }
            }
          } else if (!isLinkedDevice.current) {
             saveToFirebase(appData);
          }
        });
        return () => unsubscribe();
      }, [db, user, syncId, isLoaded]);

      // データ変更時
      useEffect(() => {
        if (isLoaded) {
          safeStorage.set('ai_review_app_data', JSON.stringify(appData));
          if (isIncomingUpdate.current) isIncomingUpdate.current = false;
          else saveToFirebase(appData);
        }
      }, [appData, isLoaded]);

      // Auth
      useEffect(() => {
        if (!auth) return;
        auth.signInAnonymously().catch(e => console.error(e));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      if (!isLoaded) return null;

      return (
        <div>
          <header className="bg-slate-800 text-white shadow-md print-hidden sticky top-0 z-50">
            <div className="container mx-auto px-4 py-2 flex flex-wrap justify-between items-center">
              <h1 className="text-xl font-bold flex items-center gap-2 tracking-wide">
                <i className="fa-solid fa-robot text-blue-400"></i>
                AI-Review-Collector
              </h1>
              <div className="flex gap-2 mt-2 sm:mt-0 items-center overflow-x-auto pb-1 sm:pb-0">
                {isSyncing && (
                  <div className="flex items-center text-xs text-slate-300 font-bold mr-2 animate-pulse whitespace-nowrap">
                    <i className="fa-solid fa-cloud-upload-alt mr-1"></i>同期中
                  </div>
                )}
                <NavButton active={activeTab === 'evaluation'} onClick={() => setActiveTab('evaluation')} icon="fa-solid fa-clipboard-check" label="授業別評価" />
                <NavButton active={activeTab === 'cumulative'} onClick={() => setActiveTab('cumulative')} icon="fa-solid fa-table" label="累積評価" />
                <NavButton active={activeTab === 'students'} onClick={() => setActiveTab('students')} icon="fa-solid fa-users" label="生徒設定" />
                <NavButton active={activeTab === 'rubric'} onClick={() => setActiveTab('rubric')} icon="fa-solid fa-scale-balanced" label="評価基準" />
                <NavButton active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon="fa-solid fa-cog" label="システム設定" />
              </div>
            </div>
          </header>

          {toast.show && (
            <div className={`fixed top-16 right-4 z-50 px-4 py-3 rounded shadow-lg flex items-center gap-2 transition-opacity font-bold ${
              toast.type === 'error' ? 'bg-red-500 text-white' : toast.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white'
            }`}>
              {toast.type === 'error' ? <i className="fa-solid fa-triangle-exclamation"></i> : <i className="fa-solid fa-check-circle"></i>}
              {toast.message}
            </div>
          )}

          <main className="container mx-auto px-2 py-4 sm:px-4">
            {activeTab === 'evaluation' && <EvaluationScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'cumulative' && <CumulativeScreen appData={appData} />}
            {activeTab === 'students' && <StudentSettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'rubric' && <RubricSettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'settings' && <SystemSettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} syncId={syncId} setSyncId={setSyncId} isLinkedDevice={isLinkedDevice} lastCloudUpdateTime={lastCloudUpdateTime} />}
          </main>
        </div>
      );
    }

    function NavButton({ active, onClick, icon, label }) {
      return (
        <button
          onClick={onClick}
          className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-sm font-bold transition-colors whitespace-nowrap ${
            active ? 'bg-white text-slate-800 shadow' : 'text-slate-300 hover:bg-slate-700 hover:text-white'
          }`}
        >
          <i className={icon}></i>
          <span className="hidden sm:inline">{label}</span>
        </button>
      );
    }

    // ==========================================
    // 1. 授業別評価画面 (EvaluationScreen)
    // ==========================================
    function EvaluationScreen({ appData, setAppData, showToast }) {
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || "");
      const [activeLessonId, setActiveLessonId] = useState("");
      const [pasteText, setPasteText] = useState("");
      const [isPasteMode, setIsPasteMode] = useState(false);
      const [isEvaluating, setIsEvaluating] = useState(false);
      const [isAnalyzing, setIsAnalyzing] = useState(false);

      const activeClass = appData.classes.find(c => c.classId === activeClassId);
      const classLessons = (appData.lessons || []).filter(l => l.classId === activeClassId).sort((a,b)=>a.count - b.count);
      const activeLesson = classLessons.find(l => l.id === activeLessonId) || classLessons[0];

      useEffect(() => {
        if (classLessons.length > 0 && !classLessons.find(l => l.id === activeLessonId)) {
          setActiveLessonId(classLessons[0].id);
        }
      }, [activeClassId, classLessons]);

      const addLesson = () => {
        if (!activeClassId) return;
        const nextCount = classLessons.length > 0 ? Math.max(...classLessons.map(l=>l.count)) + 1 : 1;
        const newLesson = {
          id: `l_${Date.now()}`, classId: activeClassId, count: nextCount, title: `第${nextCount}回 実習`, date: getLocalDateString(), overallAnalysis: ""
        };
        setAppData({ ...appData, lessons: [...appData.lessons, newLesson] });
        setActiveLessonId(newLesson.id);
      };

      const updateLesson = (id, field, value) => {
        setAppData({ ...appData, lessons: appData.lessons.map(l => l.id === id ? { ...l, [field]: value } : l) });
      };

      const getReview = (studentId) => {
        if(!activeLesson) return { attendance: "未", text: "", aiEval: "", aiReason: "", manualEval: "" };
        const reviews = appData.reviews || {};
        return reviews[`${activeLesson.id}_${studentId}`] || { attendance: "未", text: "", aiEval: "", aiReason: "", manualEval: "" };
      };

      const updateReview = (studentId, updates) => {
        if(!activeLesson) return;
        const key = `${activeLesson.id}_${studentId}`;
        const current = getReview(studentId);
        setAppData(prev => ({
          ...prev, 
          reviews: { ...(prev.reviews || {}), [key]: { ...current, ...updates } }
        }));
      };

      // 出欠連携
      const syncAttendanceFromCloud = async () => {
        const code = appData.settings.attendanceSyncCode;
        if (!code) return showToast("設定画面で「授業出欠記録システム」の同期コードを入力してください。", "error");
        if (!activeLesson) return;

        showToast("出欠データを取得中...", "info");
        try {
          const doc = await db.collection('attendance_sync').doc(code).get();
          if (doc.exists) {
            const attData = JSON.parse(doc.data().data);
            const targetLessons = attData.lessons.filter(l => l.date === activeLesson.date && l.classId === activeClassId);
            
            if (targetLessons.length === 0) {
              return showToast(`${activeLesson.date} の出欠データが見つかりませんでした。`, "error");
            }
            const attLessonId = targetLessons[0].id;
            let syncCount = 0;

            const newReviews = { ...(appData.reviews || {}) };
            activeClass.students.forEach(s => {
              const attClass = attData.classes.find(c => c.classId === activeClassId);
              if (attClass) {
                // 名前でマッチング（出欠アプリとの互換性維持）
                const attStudent = attClass.students.find(st => st.name === s.name);
                if (attStudent) {
                  const attRecord = attData.attendances[`${attLessonId}_${attStudent.id}`];
                  const status = attRecord?.status || "未";
                  const key = `${activeLesson.id}_${s.id}`;
                  const current = newReviews[key] || { attendance: "未", text: "", aiEval: "", aiReason: "", manualEval: "" };
                  newReviews[key] = { ...current, attendance: status };
                  syncCount++;
                }
              }
            });
            setAppData(prev => ({ ...prev, reviews: newReviews }));
            showToast(`${syncCount}名の出欠状況を反映しました。`, "success");
          } else {
            showToast("同期コードが無効、またはデータが存在しません。", "error");
          }
        } catch (e) {
          console.error(e);
          showToast("出欠データの取得に失敗しました。", "error");
        }
      };

      // テキスト流し込み（ペースト）
      const handleApplyPaste = () => {
        if (!activeLesson || !pasteText.trim()) return;
        const lines = pasteText.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        const activeStudents = activeClass.students.filter(s => s.status === "在籍" || s.status === "休学").filter(s => {
          const rev = getReview(s.id);
          return rev.attendance !== "欠席" && rev.attendance !== "転出";
        });

        if (lines.length !== activeStudents.length) {
          if (!window.confirm(`コピーされた行数(${lines.length})と対象生徒数(${activeStudents.length})が一致しません。\n上から順に強制的に反映しますか？`)) return;
        }

        const newReviews = { ...(appData.reviews || {}) };
        activeStudents.forEach((s, index) => {
          if (lines[index] !== undefined) {
            const key = `${activeLesson.id}_${s.id}`;
            const current = newReviews[key] || { attendance: "未", aiEval: "", aiReason: "", manualEval: "" };
            newReviews[key] = { ...current, text: lines[index] };
          }
        });
        setAppData(prev => ({ ...prev, reviews: newReviews }));
        setPasteText("");
        setIsPasteMode(false);
        showToast("テキストを反映しました。", "success");
      };

      // AI評価の実行
      const runAIEvaluation = async () => {
        if (!appData.settings.geminiApiKey) return showToast("設定画面からGemini APIキーを登録してください。", "error");
        if (!activeLesson) return;

        const grade = activeClassId.split('-')[0];
        const rubrics = appData.rubrics || {};
        const rubric = rubrics[grade] || DEFAULT_RUBRIC;

        const targetStudents = activeClass.students.filter(s => {
          const rev = getReview(s.id);
          return rev.text && !rev.aiEval && rev.attendance !== "欠席";
        });

        if (targetStudents.length === 0) return showToast("未評価のテキストがありません。", "info");

        setIsEvaluating(true);
        try {
          const targetData = targetStudents.map(s => ({
            studentId: s.id,
            text: getReview(s.id).text
          }));

          const results = await callGeminiAPI(appData.settings.geminiApiKey, rubric, targetData);
          
          const newReviews = { ...(appData.reviews || {}) };
          let successCount = 0;
          results.forEach(res => {
            if (res.studentId && res.aiEval) {
              const key = `${activeLesson.id}_${res.studentId}`;
              if (newReviews[key]) {
                newReviews[key].aiEval = res.aiEval;
                newReviews[key].aiReason = res.aiReason || "";
                successCount++;
              }
            }
          });
          setAppData(prev => ({ ...prev, reviews: newReviews }));
          showToast(`${successCount}名のAI評価が完了しました。`, "success");
        } catch (e) {
          console.error(e);
          showToast(`AI評価中にエラーが発生しました: ${e.message}`, "error");
        } finally {
          setIsEvaluating(false);
        }
      };

      // AI授業全体分析の実行
      const runOverallAnalysis = async () => {
        if (!appData.settings.geminiApiKey) return showToast("設定画面からGemini APIキーを登録してください。", "error");
        if (!activeLesson) return;

        const targetStudents = activeClass.students.filter(s => {
          const rev = getReview(s.id);
          return rev.text && rev.attendance !== "欠席";
        });

        if (targetStudents.length === 0) return showToast("分析する振り返りテキストがありません。", "info");

        setIsAnalyzing(true);
        try {
          const targetData = targetStudents.map(s => ({
            text: getReview(s.id).text
          }));

          const resultText = await callGeminiOverallAnalysisAPI(appData.settings.geminiApiKey, targetData);
          
          updateLesson(activeLesson.id, 'overallAnalysis', resultText);
          showToast(`授業全体の分析が完了しました。`, "success");
        } catch (e) {
          console.error(e);
          showToast(`分析中にエラーが発生しました: ${e.message}`, "error");
        } finally {
          setIsAnalyzing(false);
        }
      };

      if (!activeClass) return <div className="text-center p-8 text-slate-500">クラスが設定されていません。</div>;

      const evalColor = (evalStr) => {
        if (evalStr === 'A') return "bg-emerald-100 text-emerald-800 border-emerald-300";
        if (evalStr === 'B') return "bg-blue-100 text-blue-800 border-blue-300";
        if (evalStr === 'C') return "bg-orange-100 text-orange-800 border-orange-300";
        return "bg-slate-100 text-slate-400 border-slate-200";
      };

      const attendanceSelectClass = (att) => {
        if (att === '欠席') return 'bg-red-100 text-red-700 border-red-200';
        if (att === '未') return 'bg-slate-100 text-slate-500 border-slate-300 font-normal';
        return 'bg-white text-slate-600 border-slate-300';
      };

      return (
        <div className="space-y-4">
          <div className="bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
            <div className="flex gap-2 items-center flex-wrap">
              <select value={activeClassId} onChange={e => setActiveClassId(e.target.value)} className="border border-slate-300 rounded p-1.5 text-sm font-bold bg-slate-50 text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                {appData.classes.map(c => <option key={c.classId} value={c.classId}>{c.className}</option>)}
              </select>
              <i className="fa-solid fa-angle-right text-slate-300"></i>
              {classLessons.length > 0 ? (
                <select value={activeLessonId} onChange={e => setActiveLessonId(e.target.value)} className="border border-slate-300 rounded p-1.5 text-sm font-bold bg-slate-50 text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                  {classLessons.map(l => <option key={l.id} value={l.id}>{l.title} ({l.date})</option>)}
                </select>
              ) : (
                <span className="text-sm text-slate-400">授業がありません</span>
              )}
              <button onClick={addLesson} className="text-sm bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded font-bold border border-slate-300 transition-colors">
                <i className="fa-solid fa-plus"></i> 追加
              </button>
            </div>
          </div>

          {activeLesson && (
            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
              <div className="flex flex-wrap gap-4 mb-4 items-end border-b border-slate-100 pb-4">
                <div className="flex-1 min-w-[200px]">
                  <label className="block text-xs font-bold text-slate-500 mb-1">授業タイトル</label>
                  <input type="text" value={activeLesson.title} onChange={e => updateLesson(activeLesson.id, 'title', e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm font-bold focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">実施日</label>
                  <input type="date" value={activeLesson.date} onChange={e => updateLesson(activeLesson.id, 'date', e.target.value)} className="border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" />
                </div>
                <div className="flex gap-2">
                  <button onClick={syncAttendanceFromCloud} className="bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 px-3 py-2 rounded text-sm font-bold transition-colors flex items-center gap-1.5">
                    <i className="fa-solid fa-sync"></i> 出欠反映
                  </button>
                  <button onClick={() => setIsPasteMode(true)} className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-3 py-2 rounded text-sm font-bold transition-colors flex items-center gap-1.5">
                    <i className="fa-solid fa-paste"></i> テキスト流し込み
                  </button>
                </div>
              </div>

              {/* 授業全体の分析とアドバイス パネル */}
              <div className="mb-6 bg-slate-50 border border-slate-200 rounded-lg p-4">
                <div className="flex flex-wrap justify-between items-center mb-2 gap-2">
                  <h3 className="font-bold text-slate-700 flex items-center gap-2">
                    <i className="fa-solid fa-chart-line text-blue-500"></i> 授業全体の分析とアドバイス
                  </h3>
                  <div className="flex items-center gap-3">
                    <span className="text-xs font-bold text-slate-500">
                      入力済み: {activeClass.students.filter(s => getReview(s.id).text).length} 名
                    </span>
                    <button onClick={runOverallAnalysis} disabled={isAnalyzing} className="bg-white border border-blue-300 text-blue-700 hover:bg-blue-50 px-3 py-1.5 rounded text-xs font-bold transition-colors flex items-center gap-1.5 shadow-sm">
                      {isAnalyzing ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-lightbulb text-amber-500"></i>}
                      {isAnalyzing ? "分析中..." : "振り返りからクラス全体を分析"}
                    </button>
                  </div>
                </div>
                {activeLesson.overallAnalysis ? (
                  <div className="text-sm text-slate-700 bg-white p-4 rounded border border-slate-200 whitespace-pre-wrap leading-relaxed shadow-inner">
                    {activeLesson.overallAnalysis}
                  </div>
                ) : (
                  <p className="text-xs text-slate-400">
                    ボタンを押すと、入力された振り返りテキストからクラスの理解度傾向や次回へのアドバイスをAIが分析します。
                  </p>
                )}
              </div>

              <div className="flex justify-between items-center mb-3">
                <h3 className="font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-list-check"></i> 個別評価リスト</h3>
                <button onClick={runAIEvaluation} disabled={isEvaluating} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-4 py-2 rounded text-sm font-bold transition-colors flex items-center gap-2 shadow-sm">
                  {isEvaluating ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                  未評価をAIで判定
                </button>
              </div>

              <div className="overflow-x-auto border border-slate-200 rounded-lg">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="bg-slate-100 text-slate-600 border-b border-slate-200">
                    <tr>
                      <th className="p-2 w-12 text-center">番号</th>
                      <th className="p-2 w-48 text-left">氏名</th>
                      <th className="p-2 w-16 text-center">性別</th>
                      <th className="p-2 w-20 text-center">出欠</th>
                      <th className="p-2 min-w-[250px]">振り返りテキスト</th>
                      <th className="p-2 w-20 text-center">AI評価</th>
                      <th className="p-2 min-w-[150px]">AIの理由</th>
                      <th className="p-2 w-24 text-center">最終評価</th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeClass.students.map(s => {
                      const rev = getReview(s.id);
                      const isAbsent = rev.attendance === "欠席" || s.status !== "在籍";
                      return (
                        <tr key={s.id} className={`border-b border-slate-100 hover:bg-slate-50 ${isAbsent ? 'bg-slate-50 opacity-60' : ''}`}>
                          <td className="p-2 text-center text-slate-500 font-bold">{s.number}</td>
                          <td className="p-2 text-left">
                            <div className="flex flex-col">
                              <div className="flex items-center gap-1.5">
                                <span className="font-bold text-slate-700 text-base">{s.name}</span>
                                {s.status !== "在籍" && <span className="text-[10px] bg-red-100 text-red-700 px-1 py-0.5 rounded font-bold border border-red-200 leading-none">{s.status}</span>}
                              </div>
                              <span className="text-xs text-slate-400 font-normal mt-0.5">{s.furigana}</span>
                            </div>
                          </td>
                          <td className="p-2 text-center text-slate-600 text-sm">
                            {s.gender}
                          </td>
                          <td className="p-2 text-center">
                            <select value={rev.attendance} onChange={e => updateReview(s.id, { attendance: e.target.value })} className={`border rounded px-1 py-1 text-xs font-bold outline-none cursor-pointer ${attendanceSelectClass(rev.attendance)}`}>
                              <option value="未">未</option>
                              <option value="出席">出席</option>
                              <option value="欠席">欠席</option>
                              <option value="遅刻">遅刻</option>
                              <option value="早退">早退</option>
                              <option value="他">他</option>
                            </select>
                          </td>
                          <td className="p-2">
                            <input type="text" value={rev.text} onChange={e => updateReview(s.id, { text: e.target.value })} disabled={isAbsent} className="w-full border border-slate-200 rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 disabled:bg-transparent disabled:border-transparent" placeholder={isAbsent ? "-" : "テキストを入力..."} />
                          </td>
                          <td className="p-2 text-center">
                            <div className={`inline-flex items-center justify-center w-6 h-6 rounded border font-bold text-xs ${evalColor(rev.aiEval)}`}>
                              {rev.aiEval || "-"}
                            </div>
                          </td>
                          <td className="p-2 text-[10px] text-slate-500 whitespace-normal leading-tight">
                            {rev.aiReason}
                          </td>
                          <td className="p-2 text-center">
                            <select value={rev.manualEval || rev.aiEval || ""} onChange={e => updateReview(s.id, { manualEval: e.target.value })} disabled={isAbsent} className={`border rounded px-2 py-1 text-xs font-bold outline-none cursor-pointer ${evalColor(rev.manualEval || rev.aiEval)}`}>
                              <option value="">-</option>
                              <option value="A">A</option>
                              <option value="B">B</option>
                              <option value="C">C</option>
                            </select>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* テキスト流し込み用 モーダルポップアップ */}
          {isPasteMode && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-800 text-white px-4 py-3 font-bold flex justify-between items-center">
                  <span><i className="fa-solid fa-paste mr-2"></i>振り返りテキストの流し込み</span>
                  <button onClick={() => setIsPasteMode(false)} className="text-white hover:text-gray-300">
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-4 overflow-y-auto">
                  <div className="bg-indigo-50 border border-indigo-200 text-indigo-800 text-sm p-3 rounded mb-4">
                    <p className="font-bold mb-1"><i className="fa-solid fa-info-circle"></i> スプレッドシートからのコピー＆ペースト</p>
                    <ul className="list-disc pl-5 space-y-1 text-xs">
                      <li>スプレッドシート等で、該当授業の「振り返り」の列のみを選択してコピーし、下に貼り付けてください。</li>
                      <li>名簿の上から順にテキストが反映されます。<strong>※欠席者は自動的にスキップされます。</strong></li>
                    </ul>
                  </div>
                  <textarea
                    autoFocus
                    value={pasteText}
                    onChange={e => setPasteText(e.target.value)}
                    className="w-full border border-gray-300 rounded p-3 text-sm font-mono whitespace-pre focus:ring-2 focus:ring-indigo-500 h-64"
                    placeholder="ここにテキストをペーストしてください..."
                  />
                </div>
                <div className="bg-gray-50 px-4 py-3 flex justify-end gap-2 border-t">
                  <button onClick={() => setIsPasteMode(false)} className="px-4 py-2 rounded border hover:bg-gray-100 text-sm font-medium">
                    キャンセル
                  </button>
                  <button onClick={handleApplyPaste} className="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold flex items-center gap-2">
                    <i className="fa-solid fa-check"></i> 反映する
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ==========================================
    // 2. 累積評価画面 (CumulativeScreen)
    // ==========================================
    function CumulativeScreen({ appData }) {
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || "");
      const activeClass = appData.classes.find(c => c.classId === activeClassId);
      const classLessons = (appData.lessons || []).filter(l => l.classId === activeClassId).sort((a,b)=>a.count - b.count);

      const getFinalEval = (lessonId, studentId) => {
        const reviews = appData.reviews || {};
        const rev = reviews[`${lessonId}_${studentId}`];
        if (!rev) return "";
        if (rev.attendance === "欠席") return "欠";
        if (rev.attendance === "未") return "";
        return rev.manualEval || rev.aiEval || "";
      };

      const exportCSV = () => {
        if (!activeClass) return;
        let csvContent = "\uFEFF"; // BOM
        csvContent += `番号,氏名,ふりがな,性別,${classLessons.map(l => l.title || '無題').join(',')},A,B,C\n`;

        (activeClass.students || []).forEach(s => {
          let row = [s.number, s.name, s.furigana || '', s.gender || ''];
          let a=0, b=0, c=0;
          classLessons.forEach(l => {
            const ev = getFinalEval(l.id, s.id);
            row.push(ev);
            if(ev==='A') a++; if(ev==='B') b++; if(ev==='C') c++;
          });
          row.push(a, b, c);
          csvContent += row.join(',') + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${activeClass.className}_累積評価.csv`;
        link.click();
      };

      if (!activeClass) return <div className="text-center p-8 text-slate-500">クラスがありません。</div>;

      return (
        <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 print-expand">
          <div className="flex justify-between items-center mb-4 print-hidden border-b pb-3">
            <select value={activeClassId} onChange={e => setActiveClassId(e.target.value)} className="border border-slate-300 rounded p-1.5 text-sm font-bold bg-slate-50 text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
              {appData.classes.map(c => <option key={c.classId} value={c.classId}>{c.className}</option>)}
            </select>
            <div className="flex gap-2">
              <button onClick={exportCSV} className="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded text-sm font-bold transition-colors flex items-center gap-1.5">
                <i className="fa-solid fa-file-csv"></i> CSV出力
              </button>
              <button onClick={() => window.print()} className="bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 px-3 py-1.5 rounded text-sm font-bold transition-colors flex items-center gap-1.5">
                <i className="fa-solid fa-print"></i> 印刷
              </button>
            </div>
          </div>

          <h2 className="hidden print:block text-lg font-bold mb-4 text-center">{activeClass.className} 累積評価一覧</h2>

          <div className="overflow-x-auto print-expand pb-4">
            {/* w-max で囲むことで、授業数が少ない時でも列が間延びしないように制限 */}
            <table className="w-max text-sm text-center border-collapse border border-slate-300">
              <thead className="bg-slate-100 text-slate-600 font-bold whitespace-nowrap">
                <tr>
                  <th className="border border-slate-300 p-2 w-12 text-center">番号</th>
                  <th className="border border-slate-300 p-2 w-48 text-left">氏名</th>
                  <th className="border border-slate-300 p-2 w-16 text-center">性別</th>
                  {classLessons.map(l => (
                    <th key={l.id} className="border border-slate-300 p-1 w-16 text-[10px] leading-tight">
                      第{l.count}回<br/><span className="font-normal">{l.date ? String(l.date).substring(5).replace('-','/') : '-'}</span>
                    </th>
                  ))}
                  <th className="border border-slate-300 p-2 w-12 bg-blue-50 text-blue-800">A</th>
                  <th className="border border-slate-300 p-2 w-12 bg-emerald-50 text-emerald-800">B</th>
                  <th className="border border-slate-300 p-2 w-12 bg-orange-50 text-orange-800">C</th>
                </tr>
              </thead>
              <tbody>
                {(activeClass.students || []).map(s => {
                  let a=0, b=0, c=0;
                  return (
                    <tr key={s.id} className="hover:bg-slate-50 border-b border-slate-200">
                      <td className="border border-slate-300 p-2 text-center text-slate-500 font-bold">{s.number}</td>
                      <td className="border border-slate-300 p-2 text-left bg-white">
                        <div className="flex flex-col">
                          <div className="flex items-center gap-1.5">
                            <span className="font-bold text-slate-700 text-base">{s.name}</span>
                            {s.status !== "在籍" && <span className="text-[10px] bg-red-100 text-red-700 px-1 py-0.5 rounded font-bold border border-red-200 leading-none">{s.status}</span>}
                          </div>
                          <span className="text-xs text-slate-400 font-normal mt-0.5">{s.furigana}</span>
                        </div>
                      </td>
                      <td className="border border-slate-300 p-2 text-center text-slate-600 text-sm bg-white">{s.gender}</td>
                      {classLessons.map(l => {
                        const ev = getFinalEval(l.id, s.id);
                        if(ev==='A') a++; if(ev==='B') b++; if(ev==='C') c++;
                        const color = ev==='A' ? 'text-blue-600 font-bold' : ev==='B' ? 'text-emerald-600 font-bold' : ev==='C' ? 'text-orange-600 font-bold' : 'text-slate-400';
                        return <td key={l.id} className={`border border-slate-300 p-1 ${color} bg-white`}>{ev}</td>
                      })}
                      <td className="border border-slate-300 p-1 bg-blue-50/50 font-bold text-blue-800">{a || ''}</td>
                      <td className="border border-slate-300 p-1 bg-emerald-50/50 font-bold text-emerald-800">{b || ''}</td>
                      <td className="border border-slate-300 p-1 bg-orange-50/50 font-bold text-orange-800">{c || ''}</td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 評価基準設定画面 (RubricSettingsScreen)
    // ==========================================
    function RubricSettingsScreen({ appData, setAppData, showToast }) {
      const [activeGrade, setActiveGrade] = useState("1");
      
      const safeRubrics = appData.rubrics || { "1": DEFAULT_RUBRIC, "2": DEFAULT_RUBRIC, "3": DEFAULT_RUBRIC };
      const [rubricText, setRubricText] = useState(safeRubrics[activeGrade] || DEFAULT_RUBRIC);

      useEffect(() => {
        const currentRubrics = appData.rubrics || {};
        setRubricText(currentRubrics[activeGrade] || DEFAULT_RUBRIC);
      }, [activeGrade, appData.rubrics]);

      const saveRubric = () => {
        const currentRubrics = appData.rubrics || {};
        setAppData({
          ...appData,
          rubrics: { ...currentRubrics, [activeGrade]: rubricText }
        });
        showToast(`${activeGrade}年生の評価基準を保存しました。`, "success");
      };

      return (
        <div className="max-w-4xl mx-auto space-y-4">
          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="text-lg font-bold mb-4 text-slate-700 flex items-center gap-2">
              <i className="fa-solid fa-scale-balanced text-indigo-500"></i> AI評価基準（ルーブリック）の設定
            </h2>
            
            <div className="flex gap-2 mb-4 border-b border-slate-200 pb-2">
              {["1", "2", "3"].map(g => (
                <button key={g} onClick={() => setActiveGrade(g)} className={`px-4 py-2 text-sm font-bold rounded-t-lg transition-colors ${activeGrade === g ? 'bg-indigo-50 text-indigo-700 border-b-2 border-indigo-500' : 'text-slate-500 hover:bg-slate-50'}`}>
                  {g}年生
                </button>
              ))}
            </div>

            <p className="text-xs text-slate-500 mb-2 font-bold"><i className="fa-solid fa-lightbulb text-amber-500"></i> Gemini APIに送信されるプロンプトの一部として使用されます。観点やA/B/Cの条件を具体的に記述してください。</p>
            
            <textarea
              value={rubricText}
              onChange={e => setRubricText(e.target.value)}
              className="w-full h-80 border border-slate-300 rounded p-3 text-sm focus:ring-2 focus:ring-indigo-500 font-mono leading-relaxed"
            />
            
            <div className="flex justify-end mt-4">
              <button onClick={saveRubric} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded font-bold shadow-sm flex items-center gap-2">
                <i className="fa-solid fa-save"></i> 保存する
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. 生徒設定画面 (StudentSettingsScreen)
    // ==========================================
    function StudentSettingsScreen({ appData, setAppData, showToast }) {
      const safeSettings = appData.settings || { grades: { 1: 1, 2: 0, 3: 0 } };
      const [gradesConfig, setGradesConfig] = useState(safeSettings.grades || { 1: 1, 2: 0, 3: 0 });
      const [activeClassId, setActiveClassId] = useState(appData.classes[0]?.classId || "");
      const [bulkImport, setBulkImport] = useState({ show: false, text: '' });

      const activeClass = appData.classes.find(c => c.classId === activeClassId);

      const applyConfig = () => {
        let newClasses = [...appData.classes];
        [1, 2, 3].forEach(g => {
          const count = gradesConfig[g] || 0;
          for(let c=1; c<=count; c++) {
            const cId = `${g}-${c}`;
            if(!newClasses.find(cls => cls.classId === cId)) {
              newClasses.push({ classId: cId, className: `${g}年${c}組`, students: [] });
            }
          }
        });
        setAppData({ ...appData, settings: { ...appData.settings, grades: gradesConfig }, classes: newClasses });
        showToast("クラス構成を更新しました。", "success");
      };

      const handleStudentChange = (id, field, val) => {
        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: c.students.map(s => s.id === id ? { ...s, [field]: val } : s)
          } : c)
        });
      };

      const addStudent = () => {
        if(!activeClass) return;
        const nextNum = activeClass.students.length > 0 ? Math.max(...activeClass.students.map(s=>s.number)) + 1 : 1;
        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: [...c.students, { id: `s_${Date.now()}`, number: nextNum, name: "", furigana: "", gender: "その他", status: "在籍" }]
          } : c)
        });
      };

      const removeStudent = (studentId) => {
        if(!window.confirm("【警告】\nこの生徒を完全に削除すると、過去の評価データも全て消去されてしまいます。\n\n※年度途中の転出等の場合は、削除せずに「状態」を「転出」に変更することをお勧めします。\n\n本当に完全に削除してよろしいですか？")) return;
        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: c.students.filter(s => s.id !== studentId)
          } : c)
        });
      };

      const processBulkImport = () => {
        if(!activeClass || !bulkImport.text.trim()) { setBulkImport({ show: false, text: '' }); return; }
        const lines = bulkImport.text.split('\n').filter(l => l.trim() !== '');
        let currentMax = activeClass.students.length > 0 ? Math.max(...activeClass.students.map(s=>s.number)) : 0;
        
        const newStudents = lines.map((line, idx) => {
          const cols = line.split(/[\t,]/).map(c => c.trim().replace(/^"|"$/g, ''));
          let num = currentMax + 1, name = "", furigana = "", gender = "その他";
          
          if(cols.length > 0) {
            if(!isNaN(parseInt(cols[0]))) { 
              num = parseInt(cols[0]); 
              name = cols[1] || ""; 
              furigana = cols[2] || "";
              gender = cols[3] || "その他";
            } else { 
              name = cols[0]; 
              furigana = cols[1] || "";
              gender = cols[2] || "その他";
            }
          }
          if(!["男", "女", "その他"].includes(gender)) gender = "その他";
          currentMax = num;
          
          return { id: `s_bulk_${Date.now()}_${idx}`, number: num, name, furigana, gender, status: "在籍" };
        });

        setAppData({
          ...appData,
          classes: appData.classes.map(c => c.classId === activeClassId ? {
            ...c, students: [...c.students, ...newStudents]
          } : c)
        });
        showToast(`${newStudents.length}名の生徒を追加しました。`, "success");
        setBulkImport({ show: false, text: '' });
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="font-bold text-slate-700 mb-4 border-b pb-2">クラス構成設定</h2>
            <div className="flex flex-wrap gap-6 items-center justify-center mb-4">
              {[1, 2, 3].map(g => (
                <div key={g} className="flex items-center gap-2">
                  <span className="text-sm font-bold">{g}年生</span>
                  <select value={gradesConfig[g]} onChange={e => setGradesConfig({...gradesConfig, [g]: Number(e.target.value)})} className="border rounded p-1.5 text-sm">
                    {[...Array(11).keys()].map(n => <option key={n} value={n}>{n}クラス</option>)}
                  </select>
                </div>
              ))}
              <button onClick={applyConfig} className="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded text-sm font-bold">適用</button>
            </div>
          </div>

          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <div className="flex justify-between items-center mb-4 border-b pb-2">
              <select value={activeClassId} onChange={e => setActiveClassId(e.target.value)} className="border rounded p-1.5 font-bold text-sm bg-slate-50">
                {appData.classes.map(c => <option key={c.classId} value={c.classId}>{c.className}</option>)}
              </select>
              <div className="flex gap-2">
                <button onClick={() => setBulkImport({ show: true, text: '' })} className="bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100 px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1"><i className="fa-solid fa-file-import"></i> 一括追加</button>
                <button onClick={addStudent} className="bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1"><i className="fa-solid fa-plus"></i> 1名追加</button>
              </div>
            </div>

            {activeClass && (
              <div className="overflow-x-auto border rounded">
                <table className="w-full text-sm whitespace-nowrap">
                  <thead className="bg-slate-100 text-slate-600">
                    <tr>
                      <th className="p-2 w-16">番号</th>
                      <th className="p-2">名前</th>
                      <th className="p-2">ふりがな</th>
                      <th className="p-2 w-20">性別</th>
                      <th className="p-2 w-24">状態</th>
                      <th className="p-2 w-16">削除</th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeClass.students.map(s => (
                      <tr key={s.id} className="border-b hover:bg-slate-50">
                        <td className="p-1"><input type="number" value={s.number} onChange={e => handleStudentChange(s.id, 'number', Number(e.target.value))} className="w-full text-center border rounded p-1" /></td>
                        <td className="p-1"><input type="text" value={s.name} onChange={e => handleStudentChange(s.id, 'name', e.target.value)} className={`w-full border rounded p-1 ${s.status!=='在籍'?'text-slate-400':''}`} /></td>
                        <td className="p-1"><input type="text" value={s.furigana || ""} onChange={e => handleStudentChange(s.id, 'furigana', e.target.value)} className={`w-full border rounded p-1 ${s.status!=='在籍'?'text-slate-400':''}`} /></td>
                        <td className="p-1">
                          <select value={s.gender || "その他"} onChange={e => handleStudentChange(s.id, 'gender', e.target.value)} className="w-full border rounded p-1 font-bold">
                            <option value="男">男</option><option value="女">女</option><option value="その他">その他</option>
                          </select>
                        </td>
                        <td className="p-1">
                          <select value={s.status} onChange={e => handleStudentChange(s.id, 'status', e.target.value)} className="w-full border rounded p-1 font-bold">
                            <option value="在籍">在籍</option><option value="転出">転出</option><option value="休学">休学</option>
                          </select>
                        </td>
                        <td className="p-1 text-center">
                          <button onClick={() => removeStudent(s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded transition-colors" title="削除">
                            <i className="fa-solid fa-trash"></i>
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {bulkImport.show && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-800 text-white px-4 py-3 font-bold flex justify-between items-center">
                  <span><i className="fa-solid fa-file-import mr-2"></i>名簿データ一括追加</span>
                  <button onClick={() => setBulkImport({ show: false, text: '' })} className="text-white hover:text-gray-300">
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-4 overflow-y-auto">
                  <p className="text-xs text-slate-500 mb-2">Excel等から「出席番号」「氏名」「ふりがな」「性別」の列をコピーして貼り付けてください。</p>
                  <textarea value={bulkImport.text} onChange={e => setBulkImport({...bulkImport, text: e.target.value})} className="w-full h-48 border rounded p-2 text-sm font-mono" placeholder="1 山田太郎 やまだたろう 男&#10;2 佐藤花子 さとうはなこ 女"></textarea>
                </div>
                <div className="bg-slate-50 px-4 py-3 flex justify-end gap-2 border-t">
                  <button onClick={() => setBulkImport({ show: false, text: '' })} className="px-4 py-2 border rounded bg-white text-sm font-bold">キャンセル</button>
                  <button onClick={processBulkImport} className="px-4 py-2 rounded bg-indigo-600 text-white text-sm font-bold">追加する</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. システム設定画面 (SystemSettingsScreen)
    // ==========================================
    function SystemSettingsScreen({ appData, setAppData, showToast, syncId, setSyncId, isLinkedDevice, lastCloudUpdateTime }) {
      const safeSettings = appData.settings || {};
      const [apiInput, setApiInput] = useState(safeSettings.geminiApiKey || "");
      const [attSyncInput, setAttSyncInput] = useState(safeSettings.attendanceSyncCode || "");
      const [linkInput, setLinkInput] = useState("");

      const saveApiSettings = () => {
        setAppData({ ...appData, settings: { ...(appData.settings || {}), geminiApiKey: apiInput.trim(), attendanceSyncCode: attSyncInput.trim() } });
        showToast("設定を保存しました。", "success");
      };

      const handleLink = () => {
        if (!/^\d{8}$/.test(linkInput)) return showToast("正しい8桁のコードを入力してください", "error");
        if (window.confirm(`この端末のデータは失われ、コード ${linkInput} のデータで上書きされます。よろしいですか？`)) {
          safeStorage.set('ai_review_sync_id', linkInput);
          setSyncId(linkInput);
          isLinkedDevice.current = true;
          lastCloudUpdateTime.current = 0;
          showToast("同期コードをリンクしました。", "success");
        }
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="font-bold text-slate-700 mb-4 border-b pb-2 flex items-center gap-2"><i className="fa-solid fa-key text-amber-500"></i> API・連携設定</h2>
            
            <div className="mb-4">
              <label className="block text-sm font-bold text-slate-600 mb-1">Gemini API キー</label>
              <input type="password" value={apiInput} onChange={e => setApiInput(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-amber-500 font-mono" placeholder="AIzaSy..." />
              <p className="text-xs text-slate-400 mt-1">※AI評価を実行するために必要です。端末内にのみ保存されます。</p>
            </div>

            <div className="mb-4">
              <label className="block text-sm font-bold text-slate-600 mb-1">授業出欠記録システムの同期コード</label>
              <input type="text" value={attSyncInput} onChange={e => setAttSyncInput(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-amber-500 font-mono tracking-widest" placeholder="8桁の数字" />
              <p className="text-xs text-slate-400 mt-1">※設定すると、授業別評価画面で出欠データを一括取得できます。</p>
            </div>

            <button onClick={saveApiSettings} className="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2 rounded font-bold shadow-sm flex items-center gap-2"><i className="fa-solid fa-save"></i> 設定を保存</button>
          </div>

          <div className="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
            <h2 className="font-bold text-slate-700 mb-4 border-b pb-2 flex items-center gap-2"><i className="fa-solid fa-cloud text-blue-500"></i> データ同期 (AI-Review-Collector)</h2>
            <div className="flex items-center gap-3 mb-4 bg-blue-50 p-4 rounded border border-blue-100">
              <span className="text-sm font-bold text-blue-800">あなたの同期コード:</span>
              <span className="text-2xl font-bold tracking-widest text-blue-600 bg-white px-4 py-1.5 rounded shadow-sm border border-blue-200 select-all">{syncId}</span>
            </div>

            <div className="pt-2">
              <label className="block text-sm font-bold text-slate-600 mb-1">他の端末のデータとリンクする（上書きされます）</label>
              <div className="flex gap-2">
                <input type="text" value={linkInput} onChange={e => setLinkInput(e.target.value)} placeholder="8桁のコード" className="border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 tracking-widest w-48" />
                <button onClick={handleLink} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold whitespace-nowrap flex items-center gap-2"><i className="fa-solid fa-link"></i> リンクする</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
