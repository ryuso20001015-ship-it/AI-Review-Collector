      BarChart: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
      Settings: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Sparkles: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
      ClipboardPaste: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
      Download: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Trash2: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      CheckCircle2: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
      AlertCircle: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      Import: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4"/></svg>,
      X: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
      Check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 6 9 17l-5-5"/></svg>,
      ChevronRight: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m9 18 6-6-6-6"/></svg>,
      Cloud: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M17.5 19a4.5 4.5 0 0 0 0-9h-.08a7 7 0 0 0-13.84 0A4.5 4.5 0 0 0 5.5 19Z"/></svg>,
      CloudUpload: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 16 4-4 4 4"/></svg>,
      Link: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
      LogOut: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
      LogIn: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>,
      Refresh: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
      Copy: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
      Database: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
    };

    // ==========================================
    // データスキーマ・初期値
    // ==========================================
    const DEFAULT_DATA = {
      classes: [{ id: "1-1", name: "1年1組", students: [] }],
      lessons: [],
      evaluations: {},
      settings: { 
        geminiApiKey: "", 
        attendanceSyncCode: "",
        grades: { 1: 1, 2: 0, 3: 0 },
        rubric: `【評価基準】
- 観点1：内容理解（専門用語や事実を正しく記述しているか）
- 観点2：実生活とのつながり（自分の生活や社会課題と結びつけて考察しているか）
- 観点3：新たな疑問や課題（次に向けて工夫したいことなどを見出しているか）

【判定条件】
- A評価: 3観点のうち、2つ以上を具体的に満たしている。
- B評価: 授業内容の要約（観点1）はできているが、自身の考察や発展的思考（観点2,3）が乏しい。
- C評価: 記述が極端に短い、または授業の主旨と関係ない。`
      }
    };

    // ==========================================
    // Gemini API 呼び出しロジック
    // ==========================================
    const evaluateWithGemini = async (apiKey, rubric, targetComments) => {
      const prompt = `あなたは中学校技術科の教員をサポートするAIです。
以下の生徒の実習振り返りコメントを評価基準に従ってA, B, Cで評価し、理由を簡潔に添えてJSON形式で出力してください。

${rubric}

【出力JSONフォーマット（厳守）】
{
  "results": [
    {
      "evalKey": "入力されたevalKeyと同一の文字列",
      "grade": "AまたはBまたはC",
      "reason": "評価の理由（50文字程度で簡潔に）"
    }
  ]
}

【生徒のコメントリスト】
${JSON.stringify(targetComments.map(c => ({ evalKey: c.evalKey, text: c.text })), null, 2)}
`;

      const requestBody = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
      };

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
      });

      if (!res.ok) {
        const errorText = await res.text();
        throw new Error(`APIリクエスト失敗: ${res.status}`);
      }

      const data = await res.json();
      const resultText = data.candidates[0].content.parts[0].text;
      const parsed = JSON.parse(resultText);
      return parsed.results;
    };

    // ==========================================
    // 共通UIコンポーネント: クラス選択
    // ==========================================
    function ClassSelector({ visibleClasses, selectedClassId, onSelectClass }) {
      const [activeGradeTab, setActiveGradeTab] = useState(selectedClassId ? selectedClassId.split('-')[0] : "1");

      useEffect(() => {
        if (selectedClassId && selectedClassId.includes('-')) {
          setActiveGradeTab(selectedClassId.split('-')[0]);
        }
      }, [selectedClassId]);

      const handleGradeClick = (g) => {
        setActiveGradeTab(g.toString());
        const firstClass = visibleClasses.find(c => c.id.startsWith(`${g}-`));
        if (firstClass) onSelectClass(firstClass.id);
      };

      return (
        <div className="flex flex-wrap items-center gap-2">
          <div className="flex gap-1 flex-wrap">
            {[1, 2, 3].map(g => {
              const hasClasses = visibleClasses.some(c => c.id.startsWith(`${g}-`));
              if (!hasClasses) return null;
              return (
                <button
                  key={`grade-${g}`}
                  onClick={() => handleGradeClick(g)}
                  className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                    activeGradeTab === g.toString()
                      ? 'bg-brand-600 text-white border-brand-600 shadow-sm'
                      : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                  }`}
                >
                  {g}年
                </button>
              );
            })}
          </div>

          <Icons.ChevronRight className="w-4 h-4 text-gray-300 mx-1" />

          <div className="flex gap-1 flex-wrap">
            {visibleClasses.filter(c => c.id.startsWith(`${activeGradeTab}-`) || !c.id.includes('-')).map(c => (
              <button
                key={c.id}
                onClick={() => onSelectClass(c.id)}
                className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                  selectedClassId === c.id
                    ? 'bg-brand-500 text-white border-brand-500 shadow-sm'
                    : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                }`}
              >
                {c.name.replace(`${activeGradeTab}年`, '')}
              </button>
            ))}
          </div>
        </div>
      );
    }

    const waitFbConfig = async () => {
      for(let i=0; i<20; i++){
          if(window.fbConfig) return true;
          await new Promise(r=>setTimeout(r,100));
      }
      return false;
    };

    // ==========================================
    // メインコンポーネント
    // ==========================================
    function App() {
      const [appData, setAppData] = useState(DEFAULT_DATA);
      const [activeTab, setActiveTab] = useState('evaluation'); // evaluation, summary, settings, sync
      const [isLoaded, setIsLoaded] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      // Firebase Sync State
      const [user, setUser] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncId, setSyncId] = useState(() => {
        let id = localStorage.getItem('reflectTech_sync_id');
        if (!id) {
          id = Math.floor(10000000 + Math.random() * 90000000).toString();
          localStorage.setItem('reflectTech_sync_id', id);
        }
        return id;
      });
      const lastCloudUpdateTime = useRef(0);
      const isIncomingUpdate = useRef(false);
      const isLinkedDevice = useRef(false);
      const [isFbReady, setIsFbReady] = useState(false);
      const [dbInstance, setDbInstance] = useState(null);
      
      // 出欠システム連携 State
      const [externalAttendanceData, setExternalAttendanceData] = useState(null);

      const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

      // (1) Firebase Init
      useEffect(() => {
        const initFb = async () => {
          const loaded = await waitFbConfig();
          if (loaded && typeof __firebase_config !== 'undefined' && __firebase_config) {
            try {
              const config = JSON.parse(__firebase_config);
              const app = window.fbConfig.initializeApp(config);
              const auth = window.fbConfig.getAuth(app);
              const db = window.fbConfig.getFirestore(app);
              setDbInstance(db);

              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await window.fbConfig.signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await window.fbConfig.signInAnonymously(auth);
              }

              const unsubscribe = window.fbConfig.onAuthStateChanged(auth, (u) => {
                setUser(u);
                setIsFbReady(true);
              });
              return () => unsubscribe();
            } catch(e) { console.error("Firebase Auth Error", e); }
          }
        };
        initFb();
      }, []);

      // (2) onSnapshot
      useEffect(() => {
        if (!user || !isFbReady || !dbInstance) return;
        const docRef = window.fbConfig.doc(dbInstance, 'artifacts', appId, 'public', 'data', 'reflect_tech_sync', syncId);
        
        const unsubscribe = window.fbConfig.onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            const cloudTime = data.updatedAt ? new Date(data.updatedAt).getTime() : 0;
            if (cloudTime > lastCloudUpdateTime.current) {
              lastCloudUpdateTime.current = cloudTime;
              isIncomingUpdate.current = true;
              setAppData(JSON.parse(data.data));
            }
          } else {
            if (!isLinkedDevice.current && isLoaded) {
              saveToFirebase(appData);
            }
          }
        }, (err) => console.error(err));
        return () => unsubscribe();
      }, [user, isFbReady, syncId, isLoaded, dbInstance]);

      // (3) 出欠システムデータ取得リスナー
      useEffect(() => {
        if (!user || !isFbReady || !dbInstance || !isLoaded) return;
        const targetCode = appData.settings?.attendanceSyncCode;
        if (!targetCode) {
          setExternalAttendanceData(null);
          return;
        }

        // 出欠システムのFirestoreパス（仮：attendance_sync コレクション）をリスニング
        const docRef = window.fbConfig.doc(dbInstance, 'artifacts', appId, 'public', 'data', 'attendance_sync', targetCode);
        const unsubscribe = window.fbConfig.onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            try {
              const data = JSON.parse(docSnap.data().data);
              setExternalAttendanceData(data);
              console.log("出欠データを受信しました", data);
            } catch(e) { console.error("出欠データパースエラー", e); }
          } else {
            setExternalAttendanceData(null);
          }
        }, (err) => console.error(err));
        return () => unsubscribe();
      }, [user, isFbReady, appData.settings?.attendanceSyncCode, isLoaded, dbInstance]);


      const saveToFirebase = async (dataToSave) => {
        if (!dbInstance || !user) return;
        setIsSyncing(true);
        const now = new Date().toISOString();
        lastCloudUpdateTime.current = new Date(now).getTime();
        try {
          const docRef = window.fbConfig.doc(dbInstance, 'artifacts', appId, 'public', 'data', 'reflect_tech_sync', syncId);
          await window.fbConfig.setDoc(docRef, {
            data: JSON.stringify(dataToSave),
            updatedAt: now
          });
        } catch(e) { console.error(e); }
        finally { setTimeout(() => setIsSyncing(false), 1000); }
      };

      const handleLinkDevice = (newCode) => {
        if (!/^\d{8}$/.test(newCode)) {
          showToast("正しい8桁の数字を入力してください", "error");
          return;
        }
        if (window.confirm(`同期コード ${newCode} にリンクします。\n現在のこの端末のデータは失われ、リンク先のデータで上書きされますがよろしいですか？`)) {
          localStorage.setItem('reflectTech_sync_id', newCode);
          setSyncId(newCode);
          isLinkedDevice.current = true;
          lastCloudUpdateTime.current = 0;
          showToast("同期コードをリンクし、データの受信を開始しました", "success");
        }
      };

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      // 初期データロード
      useEffect(() => {
        const saved = localStorage.getItem('reflectTechData');
        if (saved) {
          try { 
            let parsed = JSON.parse(saved); 
            if (!parsed.settings) parsed.settings = { geminiApiKey: "" };
            if (!parsed.settings.rubric) parsed.settings.rubric = DEFAULT_DATA.settings.rubric;
            if (!parsed.settings.grades) {
              parsed.settings.grades = {
                1: parsed.classes.filter(c => c.id.startsWith('1-')).length || 1,
                2: parsed.classes.filter(c => c.id.startsWith('2-')).length || 0,
                3: parsed.classes.filter(c => c.id.startsWith('3-')).length || 0,
              };
            }
            parsed.classes.forEach(c => {
              if (c.id.startsWith('c_')) {
                 // 古い形式のIDを強制的に1年に変換（簡易的な互換性）
                 c.id = "1-" + (c.id.split('_')[1].slice(-1) || "1");
              }
              c.students.forEach(s => {
                if (!s.status) s.status = "在籍";
              });
            });
            setAppData(parsed); 
          } catch(e) { console.error("データ読み込みエラー", e); }
        }
        setIsLoaded(true);
      }, []);

      // データ保存 & 同期送信
      useEffect(() => {
        if (isLoaded) {
          localStorage.setItem('reflectTechData', JSON.stringify(appData));
          if (isIncomingUpdate.current) {
            isIncomingUpdate.current = false;
          } else {
            saveToFirebase(appData);
          }
        }
      }, [appData, isLoaded]);

      if (!isLoaded) return null;

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header & Navigation */}
          <header className="bg-white shadow-sm border-b border-slate-200">
            <div className="container mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2 text-brand-600">
                <Icons.Sparkles className="w-6 h-6" />
                <h1 className="text-xl font-bold tracking-wide">Reflect-Tech</h1>
                <span className="text-xs bg-brand-100 text-brand-700 px-2 py-0.5 rounded-full ml-2 font-medium">技術科 振り返りAI評価</span>
              </div>
              <div className="flex gap-1 items-center">
                {isSyncing && (
                  <div className="flex items-center text-xs text-brand-600 font-bold mr-2 animate-pulse">
                    <Icons.CloudUpload className="w-4 h-4 mr-1"/>同期中
                  </div>
                )}
                <NavBtn active={activeTab==='evaluation'} onClick={()=>setActiveTab('evaluation')} icon={<Icons.FileText className="w-4 h-4"/>} label="授業別評価" />
                <NavBtn active={activeTab==='summary'} onClick={()=>setActiveTab('summary')} icon={<Icons.BarChart className="w-4 h-4"/>} label="累積評価" />
                <NavBtn active={activeTab==='settings'} onClick={()=>setActiveTab('settings')} icon={<Icons.Users className="w-4 h-4"/>} label="名簿・設定" />
                <NavBtn active={activeTab==='sync'} onClick={()=>setActiveTab('sync')} icon={<Icons.Refresh className="w-4 h-4"/>} label="データ同期" />
              </div>
            </div>
          </header>

          {toast.show && (
            <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded shadow-lg flex items-center gap-2 transition-opacity ${
              toast.type === 'error' ? 'bg-red-500 text-white' : 
              toast.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-brand-600 text-white'
            }`}>
              {toast.type === 'error' ? <Icons.AlertCircle className="w-5 h-5" /> : <Icons.CheckCircle2 className="w-5 h-5" />}
              {toast.message}
            </div>
          )}

          {/* Main Content Area */}
          <main className="flex-1 container mx-auto px-4 py-6">
            {activeTab === 'evaluation' && <EvaluationScreen appData={appData} setAppData={setAppData} externalAttendanceData={externalAttendanceData} showToast={showToast} />}
            {activeTab === 'summary' && <SummaryScreen appData={appData} />}
            {activeTab === 'settings' && <SettingsScreen appData={appData} setAppData={setAppData} showToast={showToast} />}
            {activeTab === 'sync' && <SyncScreen appData={appData} setAppData={setAppData} showToast={showToast} user={user} syncId={syncId} onLinkDevice={handleLinkDevice} />}
          </main>
        </div>
      );
    }

    function NavBtn({ active, onClick, icon, label }) {
      return (
        <button onClick={onClick} className={`flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${active ? 'bg-brand-50 text-brand-600' : 'text-slate-500 hover:bg-slate-100'}`}>
          {icon} <span>{label}</span>
        </button>
      );
    }

    // ==========================================
    // 画面1: 授業別評価画面
    // ==========================================
    function EvaluationScreen({ appData, setAppData, externalAttendanceData, showToast }) {
      const { classes, lessons, evaluations, settings } = appData;
      const gradesConfig = settings?.grades || { 1: 1, 2: 0, 3: 0 };
      const visibleClasses = classes.filter(c => {
        if (!c.id.includes('-')) return true;
        const [g, num] = c.id.split('-');
        return parseInt(num) <= (gradesConfig[g] || 0);
      });

      const [selectedClassId, setSelectedClassId] = useState(visibleClasses[0]?.id || "");
      const [selectedLessonId, setSelectedLessonId] = useState("");
      const [pasteText, setPasteText] = useState("");
      const [isEvaluating, setIsEvaluating] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      const activeClass = classes.find(c => c.id === selectedClassId);
      const classLessons = lessons.filter(l => l.classId === selectedClassId);
      const activeLesson = classLessons.find(l => l.id === selectedLessonId);
      
      const [extLessonId, setExtLessonId] = useState("");

      // クラスが切り替わった時に、自動的に最初の授業を選択
      useEffect(() => {
        if (selectedClassId) {
          const lsns = lessons.filter(l => l.classId === selectedClassId);
          if (lsns.length > 0) setSelectedLessonId(lsns[0].id);
          else setSelectedLessonId("");
        }
      }, [selectedClassId, lessons]);

      const handleAddLesson = () => {
        const name = prompt("新しい授業の名称を入力してください (例: 第1回 本立て製作)");
        if (!name) return;
        const newLesson = { id: `l_${Date.now()}`, classId: selectedClassId, name };
        setAppData({ ...appData, lessons: [...lessons, newLesson] });
        setSelectedLessonId(newLesson.id);
      };

      const handleApplyPaste = () => {
        if (!activeClass || !activeLesson) return;
        // 最後の空行を取り除く
        const lines = pasteText.split(/\r?\n/);
        if (lines.length > 0 && lines[lines.length - 1] === "") lines.pop();

        const activeStudents = activeClass.students.filter(s => s.status === '在籍' || !s.status);

        if (lines.length !== activeStudents.length) {
          if (!confirm(`ペーストされた行数(${lines.length}行)と有効な生徒数(${activeStudents.length}名)が一致しません。\n空白行などによるズレの可能性がありますが、このまま流し込みますか？`)) {
            return;
          }
        }

        const newEvals = { ...evaluations };
        activeStudents.forEach((student, idx) => {
          const text = lines[idx] !== undefined ? lines[idx].trim() : "";
          const key = `${activeLesson.id}_${student.id}`;
          const current = newEvals[key] || {};
          newEvals[key] = { ...current, text };
        });

        setAppData({ ...appData, evaluations: newEvals });
        setPasteText("");
        setErrorMsg("");
      };

      const handleImportAttendance = () => {
        if (!externalAttendanceData || !activeClass || !activeLesson || !extLessonId) return;

        // 出欠システム側のデータ構造から対象クラスの出欠を抽出する（構造は出欠システムに依存）
        // ※ここでは、出欠システムが classes, lessons, attendance(キー: lessonId_studentId) を持っていると仮定
        const extAttendance = externalAttendanceData.attendance || {};
        
        const newEvals = { ...evaluations };
        let importCount = 0;

        activeClass.students.forEach(student => {
          // ※生徒番号と名前で照合を試みる（IDが異なるシステム間のため）
          const extClass = externalAttendanceData.classes?.find(c => c.name === activeClass.name);
          if (extClass) {
             const extStudent = extClass.students?.find(s => s.number === student.number);
             if (extStudent) {
               const status = extAttendance[`${extLessonId}_${extStudent.id}`] || "出席";
               // 遅刻・早退などは一旦「出席（授業を受けた）」として扱い、欠席のみ分離
               const isAbsent = status === "欠席" || status.includes("欠");
               
               const evalKey = `${activeLesson.id}_${student.id}`;
               newEvals[evalKey] = {
                 ...(newEvals[evalKey] || {}),
                 attendance: isAbsent ? "欠席" : "出席"
               };
               importCount++;
             }
          }
        });

        if (importCount > 0) {
          setAppData({ ...appData, evaluations: newEvals });
          showToast(`${importCount}名の出欠データを反映しました`, "success");
        } else {
          showToast("一致する生徒データが見つかりませんでした", "error");
        }
      };

      const handleRunAI = async () => {
        if (!settings.geminiApiKey) {
          setErrorMsg("「名簿・設定」画面から Gemini APIキー を設定してください。");
          return;
        }
        if (!activeClass || !activeLesson) return;

        // 評価対象（テキストがあり、かつAI評価がまだ空のもの、かつ欠席でないもの）を抽出
        const targets = activeClass.students.map(s => {
          const key = `${activeLesson.id}_${s.id}`;
          const ev = evaluations[key];
          return { evalKey: key, text: ev?.text || "", aiGrade: ev?.aiGrade || "", attendance: ev?.attendance || "出席" };
        }).filter(t => t.text.trim() !== "" && t.aiGrade === "" && t.attendance !== "欠席");

        if (targets.length === 0) {
          alert("新たにAI解析が必要なテキストはありません。（すべての入力済みテキストが評価済み、または欠席者です）");
          return;
        }

        setIsEvaluating(true);
        setErrorMsg("");

        try {
          // トークン制限や安定性を考慮し、最大40件ずつバッチ処理（1クラス分なら通常1回で終わる）
          const batchSize = 40;
          let newEvals = { ...evaluations };

          for (let i = 0; i < targets.length; i += batchSize) {
            const batch = targets.slice(i, i + batchSize);
            const results = await evaluateWithGemini(settings.geminiApiKey, settings.rubric, batch);
            
            results.forEach(res => {
              if (newEvals[res.evalKey]) {
                newEvals[res.evalKey] = {
                  ...newEvals[res.evalKey],
                  aiGrade: res.grade,
                  aiReason: res.reason,
                  finalGrade: newEvals[res.evalKey].finalGrade || res.grade // 最終評価の初期値としてAI評価をセット
                };
              }
            });
          }

          setAppData({ ...appData, evaluations: newEvals });
        } catch (e) {
          console.error(e);
          setErrorMsg("AI解析中にエラーが発生しました: " + e.message);
        } finally {
          setIsEvaluating(false);
        }
      };

      const updateFinalGrade = (evalKey, grade) => {
        const newEvals = { ...evaluations, [evalKey]: { ...(evaluations[evalKey] || {}), finalGrade: grade } };
        setAppData({ ...appData, evaluations: newEvals });
      };

      const updateAttendance = (evalKey, status) => {
        const newEvals = { ...evaluations, [evalKey]: { ...(evaluations[evalKey] || {}), attendance: status } };
        // 欠席にした場合、テキストや評価をクリアするかどうか（今回はそのまま保持し表示だけ制御）
        setAppData({ ...appData, evaluations: newEvals });
      };

      const updateTextManual = (evalKey, text) => {
        const newEvals = { ...evaluations, [evalKey]: { ...(evaluations[evalKey] || {}), text } };
        setAppData({ ...appData, evaluations: newEvals });
      };

      if (classes.length === 0) {
        return <div className="text-center py-10 text-slate-500">まずは「名簿・設定」からクラスを登録してください。</div>;
      }
      
      if (visibleClasses.length === 0) {
        return <div className="text-center py-10 text-slate-500">表示できるクラスがありません。「名簿・設定」でクラス構成を確認してください。</div>;
      }

      const getGradeColor = (g) => {
        if (g === 'A') return 'text-blue-600 bg-blue-50 font-bold';
        if (g === 'B') return 'text-emerald-600 bg-emerald-50 font-bold';
        if (g === 'C') return 'text-amber-600 bg-amber-50 font-bold';
        return 'text-slate-400';
      };

      return (
        <div className="space-y-6">
          {/* コントロールパネル */}
          <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div className="flex flex-col md:flex-row gap-4 items-start md:items-end mb-4 border-b border-slate-100 pb-4">
              <div className="w-full md:w-auto">
                <label className="block text-xs font-bold text-slate-500 mb-1">対象クラス</label>
                <ClassSelector visibleClasses={visibleClasses} selectedClassId={selectedClassId} onSelectClass={setSelectedClassId} />
              </div>
              <div className="w-full md:w-1/3">
                <label className="block text-xs font-bold text-slate-500 mb-1">授業（単元）選択</label>
                <div className="flex gap-2">
                  <select value={selectedLessonId} onChange={e => setSelectedLessonId(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm focus:border-brand-500 outline-none">
                    {classLessons.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                  </select>
                  <button onClick={handleAddLesson} className="shrink-0 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded text-sm transition-colors"><Icons.Plus className="w-4 h-4" /></button>
                </div>
              </div>
            </div>

            {activeLesson && externalAttendanceData && (
              <div className="flex items-center justify-between bg-emerald-50 border border-emerald-200 p-3 rounded-lg mb-4">
                <div className="flex items-center gap-2">
                  <Icons.Database className="w-5 h-5 text-emerald-600"/>
                  <span className="text-sm font-bold text-emerald-800">出欠記録システムと連携中</span>
                </div>
                <div className="flex items-center gap-2">
                  <select value={extLessonId} onChange={e => setExtLessonId(e.target.value)} className="border border-emerald-300 rounded p-1.5 text-sm outline-none bg-white">
                    <option value="">出欠データの授業を選択...</option>
                    {externalAttendanceData.lessons?.filter(l => externalAttendanceData.classes?.find(c => c.id === l.classId)?.name === activeClass?.name).map(l => (
                      <option key={l.id} value={l.id}>{l.date || ''} {l.name}</option>
                    ))}
                  </select>
                  <button 
                    onClick={handleImportAttendance}
                    disabled={!extLessonId}
                    className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors disabled:opacity-50"
                  >
                    出欠を反映
                  </button>
                </div>
              </div>
            )}

            {activeLesson && (
              <div className="flex flex-col md:flex-row gap-4">
                <div className="w-full md:w-1/2">
                  <label className="flex items-center gap-2 text-xs font-bold text-slate-500 mb-1">
                    <Icons.ClipboardPaste className="w-4 h-4"/> スプレッドシートからコメント列をペースト
                  </label>
                  <textarea
                    value={pasteText}
                    onChange={e => setPasteText(e.target.value)}
                    placeholder="一番上の生徒から下まで縦に範囲選択してコピーし、ここに貼り付けます。"
                    className="w-full h-24 border border-slate-300 rounded p-2 text-sm focus:border-brand-500 outline-none resize-none"
                  ></textarea>
                  <div className="mt-2 flex justify-between items-center">
                    <span className="text-xs text-slate-500">
                      目安行数: <span className="font-bold">{pasteText ? pasteText.split(/\r?\n/).filter(l => l.trim()).length : 0}</span> / 有効生徒数: {activeClass?.students.filter(s => s.status === '在籍' || !s.status).length}
                    </span>
                    <button onClick={handleApplyPaste} disabled={!pasteText} className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors disabled:opacity-50">
                      リストに反映
                    </button>
                  </div>
                </div>

                <div className="w-full md:w-1/2 flex flex-col justify-end bg-brand-50 p-4 rounded-lg border border-brand-100">
                  <p className="text-sm text-brand-800 font-medium mb-3">
                    リストのズレがないか確認後、AIによる評価を実行します。
                  </p>
                  {errorMsg && <p className="text-xs text-red-600 mb-2 font-bold"><Icons.AlertCircle className="w-3 h-3 inline mr-1"/>{errorMsg}</p>}
                  <button 
                    onClick={handleRunAI} 
                    disabled={isEvaluating}
                    className="w-full bg-brand-600 hover:bg-brand-700 text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-colors disabled:opacity-70"
                  >
                    {isEvaluating ? <><Icons.Sparkles className="w-5 h-5 animate-pulse"/> AI解析中...しばらくお待ちください</> : <><Icons.Sparkles className="w-5 h-5"/> 未評価のテキストをAI解析</>}
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* 生徒リスト・評価テーブル */}
          {activeLesson && (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="bg-slate-50 text-slate-600 font-bold border-b border-slate-200">
                    <tr>
                      <th className="px-4 py-3 w-16 text-center">番号</th>
                      <th className="px-4 py-3 w-32">氏名</th>
                      <th className="px-4 py-3 w-20 text-center">出欠</th>
                      <th className="px-4 py-3 w-1/3 min-w-[200px]">振り返りコメント</th>
                      <th className="px-4 py-3 w-16 text-center">AI</th>
                      <th className="px-4 py-3 min-w-[200px]">AI 評価理由</th>
                      <th className="px-4 py-3 w-24 text-center">最終評価</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {activeClass?.students.map(student => {
                      const isInactive = student.status === '転出' || student.status === '休学';
                      const evalKey = `${activeLesson.id}_${student.id}`;
                      const ev = evaluations[evalKey] || { text: '', aiGrade: '', aiReason: '', finalGrade: '', attendance: '出席' };
                      const isAbsent = ev.attendance === '欠席';
                      
                      return (
                        <tr key={student.id} className={`hover:bg-slate-50 transition-colors ${isInactive ? 'opacity-50 bg-slate-50' : ''} ${isAbsent && !isInactive ? 'bg-slate-100/50' : ''}`}>
                          <td className="px-4 py-3 text-center text-slate-500">{student.number}</td>
                          <td className="px-4 py-3 font-medium whitespace-nowrap">
                            {student.name}
                            {isInactive && <span className="ml-2 text-[10px] bg-red-100 text-red-700 px-1 py-0.5 rounded border border-red-200">{student.status}</span>}
                          </td>
                          <td className="px-4 py-3 text-center">
                            <select 
                              value={ev.attendance || '出席'} 
                              onChange={(e) => updateAttendance(evalKey, e.target.value)}
                              disabled={isInactive}
                              className={`border border-slate-300 rounded p-1 text-xs font-bold outline-none cursor-pointer focus:border-brand-500 disabled:opacity-50 ${isAbsent ? 'bg-red-50 text-red-700 border-red-200' : 'bg-white'}`}
                            >
                              <option value="出席">出席</option>
                              <option value="欠席">欠席</option>
                            </select>
                          </td>
                          <td className="px-4 py-3">
                            <textarea
                              value={isAbsent ? '' : ev.text}
                              onChange={(e) => updateTextManual(evalKey, e.target.value)}
                              disabled={isInactive || isAbsent}
                              placeholder={isAbsent ? "欠席のため未記入" : ""}
                              className="w-full bg-transparent border border-transparent hover:border-slate-300 focus:border-brand-500 rounded p-1 text-sm outline-none resize-none min-h-[40px] disabled:bg-slate-100 disabled:text-slate-400"
                              rows={2}
                            />
                          </td>
                          <td className="px-4 py-3 text-center">
                            <span className={`inline-block w-8 py-1 rounded text-center ${isAbsent ? 'text-slate-400' : getGradeColor(ev.aiGrade)}`}>
                              {isAbsent ? '-' : (ev.aiGrade || '-')}
                            </span>
                          </td>
                          <td className="px-4 py-3 text-xs text-slate-600 leading-relaxed">
                            {isAbsent ? <span className="text-red-500 font-medium">欠席</span> : (ev.aiReason || (isInactive ? <span className="text-slate-300">-</span> : <span className="text-slate-300">未解析</span>))}
                          </td>
                          <td className="px-4 py-3 text-center">
                            <select 
                              value={isAbsent ? '' : (ev.finalGrade || '')} 
                              onChange={(e) => updateFinalGrade(evalKey, e.target.value)}
                              disabled={isInactive || isAbsent}
                              className={`border border-slate-300 rounded p-1.5 text-sm font-bold outline-none cursor-pointer focus:border-brand-500 ${isAbsent ? 'bg-slate-100 text-slate-400 border-slate-200' : getGradeColor(ev.finalGrade)} disabled:opacity-50`}
                            >
                              <option value="" className="text-slate-800">-</option>
                              <option value="A" className="text-blue-600">A</option>
                              <option value="B" className="text-emerald-600">B</option>
                              <option value="C" className="text-amber-600">C</option>
                            </select>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 画面2: 累積評価画面
    // ==========================================
    function SummaryScreen({ appData }) {
      const { classes, lessons, evaluations, settings } = appData;
      const gradesConfig = settings?.grades || { 1: 1, 2: 0, 3: 0 };
      const visibleClasses = classes.filter(c => {
        if (!c.id.includes('-')) return true;
        const [g, num] = c.id.split('-');
        return parseInt(num) <= (gradesConfig[g] || 0);
      });

      const [selectedClassId, setSelectedClassId] = useState(visibleClasses[0]?.id || "");

      const activeClass = classes.find(c => c.id === selectedClassId);
      const classLessons = lessons.filter(l => l.classId === selectedClassId);

      const exportCSV = () => {
        if (!activeClass) return;
        let csv = "番号,氏名,状態,";
        classLessons.forEach(l => csv += `${l.name},`);
        csv += "A合計,B合計,C合計\n";

        activeClass.students.forEach(s => {
          let counts = { A: 0, B: 0, C: 0 };
          csv += `${s.number},${s.name},${s.status || '在籍'},`;
          classLessons.forEach(l => {
            const grade = evaluations[`${l.id}_${s.id}`]?.finalGrade || "";
            if (counts[grade] !== undefined) counts[grade]++;
            csv += `${grade},`;
          });
          csv += `${counts.A},${counts.B},${counts.C}\n`;
        });

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `評価一覧_${activeClass.name}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      if (classes.length === 0) {
        return <div className="text-center py-10 text-slate-500">データがありません。</div>;
      }
      
      if (visibleClasses.length === 0) {
        return <div className="text-center py-10 text-slate-500">表示できるクラスがありません。</div>;
      }

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4 border-b border-slate-100 pb-4">
            <div className="w-full sm:w-auto">
              <label className="block text-xs font-bold text-slate-500 mb-1">対象クラス</label>
              <ClassSelector visibleClasses={visibleClasses} selectedClassId={selectedClassId} onSelectClass={setSelectedClassId} />
            </div>
            <button onClick={exportCSV} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 border border-slate-300 shrink-0">
              <Icons.Download className="w-4 h-4"/> CSVで出力
            </button>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full text-sm text-center">
              <thead className="bg-slate-50 text-slate-600 font-bold border-b-2 border-slate-200 whitespace-nowrap">
                <tr>
                  <th className="px-4 py-3 border-r border-slate-200 sticky left-0 bg-slate-50 z-10 w-16">番号</th>
                  <th className="px-4 py-3 border-r border-slate-200 sticky left-[64px] bg-slate-50 z-10 w-32 text-left">氏名</th>
                  {classLessons.map(l => (
                    <th key={l.id} className="px-4 py-3 border-r border-slate-200 min-w-[80px]">
                      <div className="writing-vertical-rl transform rotate-180 max-h-32 mx-auto">{l.name}</div>
                    </th>
                  ))}
                  <th className="px-4 py-3 border-l-2 border-slate-200 text-blue-600">A</th>
                  <th className="px-4 py-3 text-emerald-600">B</th>
                  <th className="px-4 py-3 text-amber-600">C</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100 border-b border-slate-200">
                {activeClass?.students.map(student => {
                  let counts = { A: 0, B: 0, C: 0 };
                  const isInactive = student.status === '転出' || student.status === '休学';
                  
                  return (
                    <tr key={student.id} className={`hover:bg-slate-50 ${isInactive ? 'opacity-50 bg-slate-50' : ''}`}>
                      <td className="px-4 py-2 text-slate-500 border-r border-slate-100 sticky left-0 bg-white z-10">{student.number}</td>
                      <td className="px-4 py-2 font-medium text-left border-r border-slate-100 whitespace-nowrap sticky left-[64px] bg-white z-10">
                        {student.name}
                        {isInactive && <span className="ml-2 text-[10px] bg-red-100 text-red-700 px-1 py-0.5 rounded border border-red-200">{student.status}</span>}
                      </td>
                      
                      {classLessons.map(l => {
                        const grade = evaluations[`${l.id}_${student.id}`]?.finalGrade;
                        if (grade && counts[grade] !== undefined) counts[grade]++;
                        return (
                          <td key={l.id} className="px-4 py-2 border-r border-slate-100 font-bold">
                            {grade === 'A' && <span className="text-blue-600">A</span>}
                            {grade === 'B' && <span className="text-emerald-600">B</span>}
                            {grade === 'C' && <span className="text-amber-600">C</span>}
                          </td>
                        );
                      })}
                      
                      <td className="px-4 py-2 border-l-2 border-slate-100 font-bold text-blue-600">{counts.A}</td>
                      <td className="px-4 py-2 font-bold text-emerald-600">{counts.B}</td>
                      <td className="px-4 py-2 font-bold text-amber-600">{counts.C}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ==========================================
    // 画面3: 設定・名簿管理画面
    // ==========================================
    function SettingsScreen({ appData, setAppData, showToast }) {
      const [apiKey, setApiKey] = useState(appData.settings.geminiApiKey || "");
      const [rubric, setRubric] = useState(appData.settings.rubric || DEFAULT_DATA.settings.rubric);

      const initialGrades = appData.settings?.grades || {
        1: appData.classes.filter(c => c.id.startsWith('1-')).length || 1,
        2: appData.classes.filter(c => c.id.startsWith('2-')).length || 0,
        3: appData.classes.filter(c => c.id.startsWith('3-')).length || 0,
      };
      
      const [gradesConfig, setGradesConfig] = useState(initialGrades);
      const [activeEditClassId, setActiveEditClassId] = useState(appData.classes[0]?.id || null);
      const [activeGradeTab, setActiveGradeTab] = useState(activeEditClassId ? activeEditClassId.split('-')[0] : "1");
      const [bulkImport, setBulkImport] = useState({ show: false, classId: null, text: '' });

      useEffect(() => {
        if (activeEditClassId && activeEditClassId.includes('-')) {
          setActiveGradeTab(activeEditClassId.split('-')[0]);
        }
      }, [activeEditClassId]);

      const handleSaveSystemSettings = () => {
        setAppData({ 
          ...appData, 
          settings: { 
            ...appData.settings, 
            geminiApiKey: apiKey,
            rubric: rubric
          } 
        });
        showToast("システム・AI設定を保存しました。", "success");
      };

      const handleConfigChange = (grade, value) => {
        setGradesConfig({ ...gradesConfig, [grade]: Number(value) });
      };

      const applySettings = () => {
        let updatedClasses = [...appData.classes];
        
        [1, 2, 3].forEach(g => {
          const count = gradesConfig[g] || 0;
          for (let c = 1; c <= count; c++) {
            const classId = `${g}-${c}`;
            if (!updatedClasses.find(cls => cls.id === classId)) {
              updatedClasses.push({
                id: classId,
                name: `${g}年${c}組`,
                students: []
              });
            }
          }
        });
        
        const hasVisibleClass = updatedClasses.some(c => {
          if (!c.id.includes('-')) return true;
          const [g, num] = c.id.split('-');
          return parseInt(num) <= (gradesConfig[g] || 0);
        });

        if (!hasVisibleClass) {
          showToast("最低でも1つのクラスが表示されるよう設定してください", "error");
          return;
        }

        setAppData({
          ...appData,
          settings: { ...appData.settings, grades: gradesConfig },
          classes: updatedClasses
        });

        if (activeEditClassId && activeEditClassId.includes('-')) {
          const [activeG, activeNum] = activeEditClassId.split('-');
          if (parseInt(activeNum) > (gradesConfig[activeG] || 0)) {
             const firstVisible = updatedClasses.find(c => {
               if (!c.id.includes('-')) return true;
               const [g, num] = c.id.split('-');
               return parseInt(num) <= (gradesConfig[g] || 0);
             });
             setActiveEditClassId(firstVisible?.id || null);
          }
        }

        showToast("クラス構成を更新しました。（※減らしたクラスのデータも保護されています）", "success");
      };

      const handleStudentChange = (classId, studentId, field, value) => {
        setAppData({
          ...appData,
          classes: appData.classes.map(c => {
            if (c.id !== classId) return c;
            return {
              ...c,
              students: c.students.map(s => s.id === studentId ? { ...s, [field]: value } : s)
            };
          })
        });
      };

      const addStudent = (classId) => {
        setAppData({
          ...appData,
          classes: appData.classes.map(c => {
            if (c.id !== classId) return c;
            const nextNum = c.students.length > 0 ? Math.max(...c.students.map(s => s.number)) + 1 : 1;
            return {
              ...c,
              students: [...c.students, { id: `s_${Date.now()}`, number: nextNum, name: "", furigana: "", gender: "男", status: "在籍" }]
            };
          })
        });
      };

      const removeStudent = (classId, studentId) => {
        if(!window.confirm("この生徒を完全に削除すると、過去の評価データも全て消去されてしまいます。\n転出等の場合は、削除せずに「状態」を「転出」に変更してください。\n\n本当に完全に削除しますか？")) return;
        setAppData({
          ...appData,
          classes: appData.classes.map(c => {
            if (c.id !== classId) return c;
            return {
              ...c,
              students: c.students.filter(s => s.id !== studentId)
            };
          })
        });
      };

      const processBulkImport = () => {
        const { classId, text } = bulkImport;
        if (!text.trim()) {
          setBulkImport({ ...bulkImport, show: false });
          return;
        }

        const lines = text.split('\n').filter(line => line.trim() !== '');
        const newStudents = [];
        
        const targetClass = appData.classes.find(c => c.id === classId);
        let currentMaxNumber = targetClass.students.length > 0 ? Math.max(...targetClass.students.map(s => s.number)) : 0;

        lines.forEach((line, index) => {
          const cols = line.split(/[\t,]/).map(c => c.trim().replace(/^"|"$/g, ''));
          if (cols.length === 0 || !cols[0]) return;

          let number = currentMaxNumber + 1;
          let name = "";
          let furigana = "";
          let gender = "その他";

          if (cols.length > 0) {
            const firstIsNum = !isNaN(parseInt(cols[0]));
            if (firstIsNum) {
              number = parseInt(cols[0]);
              name = cols[1] || "";
              furigana = cols[2] || "";
              gender = cols[3] || "その他";
            } else {
              name = cols[0];
              furigana = cols[1] || "";
              gender = cols[2] || "その他";
            }
            if(!["男", "女", "その他"].includes(gender)) gender = "その他";
          }

          currentMaxNumber = number;

          newStudents.push({
            id: `s_bulk_${Date.now()}_${index}`,
            number,
            name,
            furigana,
            gender,
            status: "在籍"
          });
        });

        if (newStudents.length > 0) {
          setAppData({
            ...appData,
            classes: appData.classes.map(c => {
              if (c.id !== classId) return c;
              return {
                ...c,
                students: [...c.students, ...newStudents]
              };
            })
          });
          showToast(`${newStudents.length}名の生徒を一括追加しました`, "success");
        }
        
        setBulkImport({ show: false, classId: null, text: '' });
      };

      const visibleClasses = appData.classes.filter(c => {
        if (!c.id.includes('-')) return true;
        const [g, num] = c.id.split('-');
        return parseInt(num) <= (appData.settings.grades[g] || 0);
      });

      const activeClass = appData.classes.find(c => c.id === activeEditClassId);

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          
          {/* システム設定 */}
          <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                <Icons.Settings className="w-5 h-5 text-slate-500"/> システム・AI設定
              </h2>
              <button onClick={handleSaveSystemSettings} className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors whitespace-nowrap">設定を保存</button>
            </div>
            
            <div className="space-y-6">
              <div className="max-w-xl">
                <label className="block text-sm font-bold text-slate-700 mb-2">Gemini API キー</label>
                <input 
                  type="password" 
                  value={apiKey} 
                  onChange={e => setApiKey(e.target.value)} 
                  placeholder="AIzaSy..." 
                  className="w-full border border-slate-300 rounded-md p-2 text-sm focus:border-brand-500 outline-none"
                />
                <p className="text-xs text-slate-500 mt-1">※取得したAPIキーはブラウザ内部(Local Storage)にのみ保存され、外部サーバには送信されません。</p>
              </div>

              <div>
                <label className="block text-sm font-bold text-slate-700 mb-2">AI評価基準（ルーブリック）</label>
                <textarea 
                  value={rubric}
                  onChange={e => setRubric(e.target.value)}
                  className="w-full h-48 border border-slate-300 rounded-md p-3 text-sm focus:border-brand-500 outline-none resize-y font-mono"
                  placeholder="評価基準を入力してください..."
                />
                <p className="text-xs text-slate-500 mt-1">※評価観点やA・B・Cの判定条件を自由にカスタマイズできます。</p>
              </div>
            </div>
          </div>

          {/* クラス・名簿管理 */}
          <div className="bg-white p-6 rounded-xl shadow-sm border-t-4 border-brand-600">
            <div className="flex flex-wrap items-center justify-center gap-6 mb-6 pb-6 border-b border-gray-200">
              <div className="flex flex-wrap justify-center gap-6">
                {[1, 2, 3].map(g => (
                  <div key={g} className="flex items-center gap-2">
                    <label className="text-sm font-bold text-gray-700 whitespace-nowrap">{g}年生</label>
                    <div className="flex items-center gap-1">
                      <select 
                        value={gradesConfig[g]} 
                        onChange={e => handleConfigChange(g, e.target.value)} 
                        className="border border-slate-300 p-1.5 rounded w-16 text-center focus:ring-2 focus:ring-brand-500 bg-white cursor-pointer" 
                      >
                        {[...Array(16).keys()].map(num => (
                          <option key={num} value={num}>{num}</option>
                        ))}
                      </select>
                      <span className="text-sm text-gray-500 whitespace-nowrap">クラス</span>
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={applySettings} className="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2 rounded font-bold transition-colors shadow whitespace-nowrap">
                設定を適用する
              </button>
            </div>

            {visibleClasses.length > 0 && (
              <div>
                <div className="flex flex-wrap items-center gap-2 mb-4 border-b pb-2">
                  <div className="flex gap-1 flex-wrap">
                    {[1, 2, 3].map(g => {
                      const hasClasses = visibleClasses.some(c => c.id.startsWith(`${g}-`));
                      if (!hasClasses) return null;
                      return (
                        <button
                          key={`grade-${g}`}
                          onClick={() => {
                            setActiveGradeTab(g.toString());
                            const firstClass = visibleClasses.find(c => c.id.startsWith(`${g}-`));
                            if (firstClass) setActiveEditClassId(firstClass.id);
                          }}
                          className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                            activeGradeTab === g.toString()
                              ? 'bg-brand-600 text-white border-brand-600 shadow-sm'
                              : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                          }`}
                        >
                          {g}年
                        </button>
                      );
                    })}
                  </div>

                  <Icons.ChevronRight className="w-4 h-4 text-gray-300 mx-1" />

                  <div className="flex gap-1 flex-wrap">
                    {visibleClasses.filter(c => c.id.startsWith(`${activeGradeTab}-`) || !c.id.includes('-')).map(c => (
                      <button
                        key={c.id}
                        onClick={() => setActiveEditClassId(c.id)}
                        className={`px-3 py-1.5 rounded text-sm font-bold transition-colors border ${
                          activeEditClassId === c.id
                            ? 'bg-brand-500 text-white border-brand-500 shadow-sm'
                            : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'
                        }`}
                      >
                        {c.name.replace(`${activeGradeTab}年`, '')}
                      </button>
                    ))}
                  </div>
                </div>

                {activeClass && (
                  <div>
                    <div className="flex flex-wrap justify-between items-center mb-2 gap-2">
                      <span className="text-sm font-bold text-gray-600">{activeClass.name} の生徒一覧 ({activeClass.students.length}名)</span>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => setBulkImport({ show: true, classId: activeClass.id, text: '' })} 
                          className="flex items-center gap-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded transition-colors"
                        >
                          <Icons.Import className="w-4 h-4" /> 一括追加
                        </button>
                        <button onClick={() => addStudent(activeClass.id)} className="flex items-center gap-2 text-sm bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded transition-colors">
                          <Icons.Plus className="w-4 h-4" /> 1名追加
                        </button>
                      </div>
                    </div>
                    
                    <div className="overflow-x-auto border border-gray-200 rounded">
                      <table className="min-w-full text-sm">
                        <thead className="bg-gray-100">
                          <tr>
                            <th className="p-2 border-b border-gray-200 text-slate-600 w-16">番号</th>
                            <th className="p-2 border-b border-gray-200 text-slate-600">名前</th>
                            <th className="p-2 border-b border-gray-200 text-slate-600">ふりがな</th>
                            <th className="p-2 border-b border-gray-200 text-slate-600 w-20">性別</th>
                            <th className="p-2 border-b border-gray-200 text-slate-600 w-24">状態</th>
                            <th className="p-2 border-b border-gray-200 text-slate-600 w-16">削除</th>
                          </tr>
                        </thead>
                        <tbody>
                          {activeClass.students.map((s, index) => (
                            <tr key={s.id} className="hover:bg-gray-50 transition-colors">
                              <td className="p-1 border-b border-gray-200 text-center">
                                <input 
                                  type="number" value={s.number} 
                                  onChange={(e) => handleStudentChange(activeClass.id, s.id, 'number', Number(e.target.value))}
                                  className="w-full p-1.5 border border-slate-300 rounded text-center focus:ring-2 focus:ring-brand-500 outline-none"
                                />
                              </td>
                              <td className="p-1 border-b border-gray-200">
                                <input 
                                  type="text" value={s.name} placeholder="例: 山田 太郎"
                                  onChange={(e) => handleStudentChange(activeClass.id, s.id, 'name', e.target.value)}
                                  className={`w-full p-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 outline-none ${s.status === '転出' || s.status === '休学' ? 'text-gray-400 bg-gray-50' : ''}`}
                                />
                              </td>
                              <td className="p-1 border-b border-gray-200">
                                <input 
                                  type="text" value={s.furigana || ""} placeholder="例: やまだ たろう"
                                  onChange={(e) => handleStudentChange(activeClass.id, s.id, 'furigana', e.target.value)}
                                  className="w-full p-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 outline-none"
                                />
                              </td>
                              <td className="p-1 border-b border-gray-200">
                                <select 
                                  value={s.gender || "その他"} 
                                  onChange={(e) => handleStudentChange(activeClass.id, s.id, 'gender', e.target.value)}
                                  className="w-full p-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-brand-500 outline-none"
                                >
                                  <option value="男">男</option>
                                  <option value="女">女</option>
                                  <option value="その他">その他</option>
                                </select>
                              </td>
                              <td className="p-1 border-b border-gray-200">
                                <select 
                                  value={s.status || "在籍"} 
                                  onChange={(e) => handleStudentChange(activeClass.id, s.id, 'status', e.target.value)}
                                  className={`w-full p-1.5 border font-bold focus:ring-2 focus:ring-brand-500 outline-none rounded ${s.status === '転出' || s.status === '休学' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}
                                >
                                  <option value="在籍">在籍</option>
                                  <option value="転出">転出</option>
                                  <option value="休学">休学</option>
                                </select>
                              </td>
                              <td className="p-1 border-b border-gray-200 text-center">
                                <button onClick={() => removeStudent(activeClass.id, s.id)} className="p-2 text-red-500 hover:bg-red-50 rounded transition-colors" title="削除（非推奨）">
                                  <Icons.Trash2 className="w-4 h-4 mx-auto" />
                                </button>
                              </td>
                            </tr>
                          ))}
                          {activeClass.students.length === 0 && (
                            <tr><td colSpan={6} className="p-8 text-center text-gray-500">生徒を追加してください</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {bulkImport.show && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-800 text-white px-4 py-3 font-bold flex justify-between items-center">
                  <span className="flex items-center gap-2"><Icons.Import className="w-5 h-5" />名簿データの一括追加</span>
                  <button onClick={() => setBulkImport({ show: false, classId: null, text: '' })} className="text-white hover:text-gray-300">
                    <Icons.X className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-4 overflow-y-auto">
                  <div className="bg-blue-50 border border-blue-200 text-blue-800 text-sm p-3 rounded mb-4">
                    <p className="font-bold mb-1">💡 Excelやスプレッドシートからコピー＆ペーストできます</p>
                    <ul className="list-disc pl-5 space-y-1 text-xs">
                      <li>以下の形式で、表計算ソフトからセルをコピーして下の枠に貼り付けてください。</li>
                      <li>形式: <strong>「出席番号」 「氏名」 「ふりがな」 「性別」</strong> の順（列がない場合は空欄や詰められていても自動判別を試みます）</li>
                      <li>出席番号が省略された場合は、現在の最大番号から自動で連番が振られます。</li>
                    </ul>
                  </div>
                  <textarea
                    autoFocus
                    value={bulkImport.text}
                    onChange={(e) => setBulkImport({ ...bulkImport, text: e.target.value })}
                    className="w-full border border-gray-300 rounded p-3 text-sm font-mono whitespace-pre focus:ring-2 focus:ring-indigo-500 h-64 outline-none"
                    placeholder="ここにExcelのセルを貼り付けてください...&#10;&#10;例:&#10;1&#9;山田 太郎&#9;やまだ たろう&#9;男&#10;2&#9;佐藤 花子&#9;さとう はなこ&#9;女&#10;3&#9;鈴木 一郎&#9;&#9;男"
                  />
                </div>
                <div className="bg-gray-50 px-4 py-3 flex justify-end gap-2 border-t border-gray-200">
                  <button onClick={() => setBulkImport({ show: false, classId: null, text: '' })} className="px-4 py-2 rounded border border-gray-300 hover:bg-gray-100 text-sm font-medium text-slate-700 transition-colors">
                    キャンセル
                  </button>
                  <button onClick={processBulkImport} className="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold flex items-center gap-2 transition-colors">
                    <Icons.Check className="w-4 h-4" /> この内容で追加する
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 画面4: データ同期・管理画面
    // ==========================================
    function SyncScreen({ appData, setAppData, showToast, user, syncId, onLinkDevice }) {
      const [importText, setImportText] = useState('');
      const [inputCode, setInputCode] = useState('');
      const [attendanceCode, setAttendanceCode] = useState(appData.settings?.attendanceSyncCode || '');
      const isFirebaseConfigured = typeof __firebase_config !== 'undefined' && __firebase_config;

      const handleCopyFallback = () => {
         const text = JSON.stringify(appData, null, 2);
         const textArea = document.createElement("textarea");
         textArea.value = text;
         document.body.appendChild(textArea);
         textArea.select();
         try {
             document.execCommand('copy');
             showToast("データをコピーしました。メモ帳等に貼り付けて保存してください。", "success");
         } catch(e) {
             showToast("コピーに失敗しました", "error");
         }
         document.body.removeChild(textArea);
      }

      const copyData = () => {
         if (navigator.clipboard && window.isSecureContext) {
             navigator.clipboard.writeText(JSON.stringify(appData, null, 2))
                .then(()=>showToast("データをコピーしました。メモ帳等に貼り付けて保存してください。", "success"))
                .catch(()=>handleCopyFallback());
         } else {
             handleCopyFallback();
         }
      }

      const handleImportJson = () => {
        if (!importText.trim()) {
          showToast("テキストが入力されていません", "error");
          return;
        }
        try {
          const parsed = JSON.parse(importText);
          if (!parsed.classes || !parsed.settings) throw new Error("不正なデータフォーマットです");
          if (window.confirm("現在のデータは失われ、入力したデータで上書きされます。よろしいですか？")) {
            setAppData(parsed);
            setImportText('');
            showToast("データを復元しました", "success");
          }
        } catch (e) {
          showToast("正しい形式のデータではありません", "error");
        }
      };

      const clearLocalData = () => {
        if (window.confirm("すべてのデータを消去して初期状態に戻します。元には戻せません。よろしいですか？")) {
          setAppData(DEFAULT_DATA);
          showToast("データを初期化しました", "success");
        }
      };

      const handleSaveAttendanceCode = () => {
        if (attendanceCode && !/^\d{8}$/.test(attendanceCode)) {
          showToast("正しい8桁の数字を入力してください", "error");
          return;
        }
        setAppData({ ...appData, settings: { ...appData.settings, attendanceSyncCode: attendanceCode } });
        showToast(attendanceCode ? "出欠連携コードを保存しました。データの受信を開始します。" : "出欠連携を解除しました", "success");
      };

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-brand-500">
            <h2 className="text-lg font-bold mb-3 flex items-center gap-2 text-slate-800">
              <Icons.Cloud className="w-5 h-5 text-brand-500"/>
              端末間のデータ同期と管理
            </h2>
            <p className="text-sm text-slate-600 mb-4">
              以下の同期コードを他の端末（スマホやタブレットなど）で入力すると、データがリアルタイムで共有されます。
            </p>
            
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-5 bg-brand-50 p-4 rounded-lg border border-brand-100">
              <span className="text-sm font-bold text-brand-800">あなたの同期コード:</span>
              <span className="text-2xl font-bold tracking-widest text-brand-600 bg-white px-4 py-1.5 rounded shadow-sm border border-brand-200 select-all">
                {syncId}
              </span>
            </div>

            <div className="border-t border-slate-200 pt-5 mt-2">
              <label className="text-sm font-bold text-slate-700 mb-1 block">他の端末のデータとリンクする</label>
              <p className="text-xs text-red-500 mb-3 font-bold">※リンクするとこの端末のデータは失われ、リンク先のデータで上書きされます。</p>
              <div className="flex flex-col sm:flex-row gap-2">
                <input 
                  type="text" 
                  value={inputCode}
                  onChange={e => setInputCode(e.target.value)}
                  placeholder="8桁の数字コードを入力" 
                  className="border border-slate-300 rounded px-3 py-2 text-base outline-none focus:ring-2 focus:ring-brand-500 flex-1 font-bold tracking-widest sm:max-w-xs"
                />
                <button 
                  onClick={() => onLinkDevice(inputCode)}
                  className="px-6 py-2 bg-brand-600 text-white rounded font-bold hover:bg-brand-700 shadow-sm transition whitespace-nowrap flex items-center justify-center gap-2"
                >
                  <Icons.Link className="w-4 h-4"/> リンクする
                </button>
              </div>
            </div>
            
            {!isFirebaseConfigured && (
               <p className="text-xs text-red-500 mt-4 font-bold"><Icons.AlertCircle className="w-4 h-4 inline mr-1" /> 現在Firebaseが設定されていないため、クラウド機能は利用できません。</p>
            )}
          </div>

          <div className="bg-white p-6 rounded-xl shadow-sm border border-emerald-200">
            <h2 className="text-lg font-bold mb-3 flex items-center gap-2 text-emerald-800">
              <Icons.Database className="w-5 h-5 text-emerald-600"/>
              他アプリとの連携（授業出欠記録システム）
            </h2>
            <p className="text-sm text-slate-600 mb-4">
              「授業出欠記録システム」で発行された8桁の同期コードを入力すると、出欠データを読み込み、「欠席」の生徒を評価対象外として一括反映できるようになります。
            </p>
            
            <div className="flex flex-col sm:flex-row gap-2 items-center">
              <input 
                type="text" 
                value={attendanceCode}
                onChange={e => setAttendanceCode(e.target.value)}
                placeholder="出欠システムの8桁のコードを入力" 
                className="border border-slate-300 rounded px-3 py-2 text-base outline-none focus:ring-2 focus:ring-emerald-500 flex-1 font-bold tracking-widest sm:max-w-xs"
              />
              <button 
                onClick={handleSaveAttendanceCode}
                className="px-6 py-2 bg-emerald-600 text-white rounded font-bold hover:bg-emerald-700 shadow-sm transition whitespace-nowrap flex items-center justify-center gap-2"
              >
                <Icons.Check className="w-4 h-4"/> 連携設定を保存
              </button>
            </div>
          </div>

          <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800"><Icons.LogOut className="w-5 h-5"/> 手動データ引き継ぎ（バックアップ・復元）</h2>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {/* 出力（エクスポート） */}
              <div className="border border-slate-200 rounded-lg p-5 bg-slate-50 flex flex-col">
                <h3 className="font-bold text-slate-800 mb-2 border-b border-slate-200 pb-2 flex items-center gap-2">
                  <Icons.LogOut className="w-4 h-4 text-brand-600"/>
                  データを出力する（バックアップ）
                </h3>
                <p className="text-sm text-slate-600 mb-4 flex-1">
                  現在のアプリのデータを専用の文字列に変換してコピーします。<br/>
                  コピーした文字列は、メモ帳やメールアプリなどに貼り付けて保存・移動してください。
                </p>
                <button 
                  onClick={copyData} 
                  className="w-full flex justify-center items-center gap-2 bg-white border-2 border-brand-600 text-brand-600 hover:bg-brand-50 px-4 py-3 rounded font-bold transition-colors"
                >
                  <Icons.Copy className="w-4 h-4"/> 現在のデータをコピーする
                </button>
              </div>

              {/* 入力（インポート） */}
              <div className="border border-slate-200 rounded-lg p-5 bg-slate-50 flex flex-col">
                <h3 className="font-bold text-slate-800 mb-2 border-b border-slate-200 pb-2 flex items-center gap-2">
                  <Icons.LogIn className="w-4 h-4 text-emerald-600"/>
                  データを取り込む（復元）
                </h3>
                <p className="text-sm text-slate-600 mb-2">
                  コピーしておいた文字列を下の枠に貼り付けて、データを復元します。<br/>
                  <span className="text-red-500 font-bold text-xs">※現在のデータは上書きされ消去されます。</span>
                </p>
                
                <textarea 
                  value={importText}
                  onChange={e => setImportText(e.target.value)}
                  placeholder="ここにコピーした文字列を貼り付けてください..."
                  className="w-full h-24 border border-slate-300 rounded p-2 text-xs font-mono bg-white mb-3 focus:ring-2 focus:ring-emerald-500 outline-none"
                />
                
                <button 
                  onClick={handleImportJson} 
                  className="w-full flex justify-center items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded font-bold transition-colors mt-auto"
                >
                  <Icons.Download className="w-4 h-4"/> 貼り付けたデータで復元する
                </button>
              </div>
            </div>
          </div>

          <div className="border border-red-200 bg-red-50 p-6 rounded-xl shadow-sm mt-10">
            <h3 className="text-red-800 font-bold flex items-center gap-2 mb-2"><Icons.AlertCircle className="w-5 h-5"/> 危険な操作</h3>
            <p className="text-sm text-red-600 mb-4">アプリ内のデータをすべて消去して初期状態に戻します。元には戻せません。</p>
            <button onClick={clearLocalData} className="bg-white border border-red-500 text-red-600 hover:bg-red-50 px-4 py-2 rounded text-sm font-bold flex items-center gap-2 transition-colors">
              <Icons.Trash2 className="w-4 h-4"/> データを全消去する
            </button>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
